<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>P2P File Transfer — Enterprise Grade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px !important;
            }
        }

        .card {
            border-radius: 28px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: none;
            background: rgba(255, 255, 255, 0.98);
        }

        .card-header {
            background: linear-gradient(105deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 1.4rem 2rem;
            border: none;
        }

        .progress {
            height: 32px;
            border-radius: 20px;
            background: #eef2ff;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3b82f6 0%, #a855f7 100%);
            transition: width 0.15s ease;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-sm {
            height: 10px;
            border-radius: 8px;
        }

        .file-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 5px solid #3b82f6;
            transition: all 0.15s;
        }

        .file-card.success {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }

        #received-files {
            max-height: 380px;
            overflow-y: auto;
        }

        .drop-zone {
            border: 2px dashed #818cf8;
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            background: #fefce8;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            background: #eef2ff;
            border-color: #a855f7;
        }

        .peer-item {
            border-radius: 60px !important;
            margin-bottom: 8px;
            background: #ffffff;
        }

        .peer-item:hover {
            background: #ede9fe;
            transform: translateX(4px);
        }

        .batch-report {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header text-white">
                <h3 class="mb-0"><i class="fas fa-shield-alt me-2"></i> P2P Secure Transfer</h3>
                <small class="text-white-50">SHA-256 verified · Auto-retry · Batch tracking</small>
            </div>

            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label class="fw-semibold"><i class="fas fa-user-astronaut"></i> Your name:</label>
                            <input type="text" id="client-id" class="form-control rounded-pill">
                        </div>

                        <div class="d-flex gap-3 mb-3">
                            <button id="connect-btn" class="btn btn-primary px-4 rounded-pill">
                                <i class="fas fa-wifi"></i> Discover
                            </button>
                            <button id="disconnect-btn" class="btn btn-outline-danger rounded-pill px-4"
                                style="display:none;">
                                <i class="fas fa-power-off"></i> Disconnect
                            </button>
                        </div>

                        <div id="connection-status" class="alert" style="display:none;"></div>

                        <div id="batch-report" class="batch-report" style="display:none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <strong><i class="fas fa-clipboard-list"></i> Transfer Report</strong>
                                <button id="clear-report-btn"
                                    class="btn btn-sm btn-link text-secondary p-0">Clear</button>
                            </div>
                            <div id="batch-stats" class="small"></div>
                            <div id="failed-files-list" class="mt-2" style="max-height: 150px; overflow-y: auto;"></div>
                        </div>
                    </div>

                    <div class="col-md-6" id="peers-container" style="display:none;">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold"><i class="fas fa-user-friends me-1"></i> Nearby devices</h5>
                            <span class="badge bg-light text-dark rounded-pill" id="peer-count">0</span>
                        </div>
                        <div id="peers-list" class="mb-3" style="max-height: 210px; overflow-y: auto;"></div>

                        <div id="transfer-section" style="display:none;">
                            <hr class="my-3">
                            <h5 class="fw-bold"><i class="fas fa-paper-plane me-2"></i> Send files</h5>

                            <div id="drop-zone" class="drop-zone">
                                <div class="icon"><i class="fas fa-cloud-upload-alt fa-2x text-primary"></i></div>
                                <div class="mt-1"><strong>Drop files anywhere</strong></div>
                                <small class="text-secondary">SHA-256 verified · Auto-retry on failure</small>
                                <input type="file" id="file-input" multiple style="display:none;">
                                <div id="selected-files" class="selected-files mt-2"></div>
                            </div>

                            <div class="d-flex gap-3 mt-2">
                                <button id="send-btn" class="btn btn-success rounded-pill px-4 fw-semibold" disabled>
                                    <i class="fas fa-rocket"></i> Send now
                                </button>
                                <button id="cancel-btn" class="btn btn-outline-danger rounded-pill px-4"
                                    style="display:none;">
                                    <i class="fas fa-ban"></i> Cancel
                                </button>
                            </div>

                            <div id="transfer-info" class="mt-4 p-3 bg-light rounded-4" style="display:none;">
                                <div id="file-info" class="small fw-semibold mb-2"></div>
                                <div class="progress mb-2">
                                    <div id="progress-bar" class="progress-bar" style="width: 0%">0%</div>
                                </div>
                                <div id="overall-progress-row" style="display: none;" class="mb-2">
                                    <div class="small text-secondary mb-1" id="overall-label">Overall:</div>
                                    <div class="progress progress-sm">
                                        <div id="overall-bar" class="progress-bar" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between flex-wrap gap-1">
                                    <span id="progress-text" class="fw-semibold">0%</span>
                                    <span id="transfer-speed" class="text-secondary"><i
                                            class="fas fa-tachometer-alt"></i> 0 B/s</span>
                                    <span id="time-remaining" class="text-secondary"><i class="far fa-clock"></i>
                                        --</span>
                                </div>
                                <div id="channel-stats" class="small text-muted mt-2"></div>
                            </div>
                        </div>

                        <div id="received-files-section" style="display:none;" class="mt-4">
                            <hr>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0"><i class="fas fa-inbox"></i> Received</h5>
                                <button id="clear-received-btn" class="btn btn-sm btn-outline-secondary rounded-pill"
                                    style="display:none;">
                                    <i class="fas fa-trash-alt"></i> Clear
                                </button>
                            </div>
                            <div id="received-files"></div>
                            <button id="download-all-btn" class="btn btn-secondary mt-2 rounded-pill"
                                style="display:none;">
                                <i class="fas fa-file-zipper"></i> ZIP all (verified)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const CONFIG = {
            numChannels: 4,
            chunkSize: 128 * 1024,
            maxBufferedAmountPerChannel: 8 * 1024 * 1024,
            heartbeatInterval: 25000,
            progressUpdateInterval: 100,
            reassemblyTimeoutMs: 120000,
            retransmitTimeoutMs: 5000
        };

        const RTC_CONFIG = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        const STATE = {
            ws: null, rtcPeer: null, dataChannels: [],
            clientId: null, peerId: null, intentionalDisconnect: false,
            transfer: {
                queue: [], currentFile: null, currentFileIdx: 0,
                totalSize: 0, transferredSize: 0, completedSize: 0,
                currentFileSize: 0, startTime: null,
                sendingActive: false, allChannelsReady: false,
                pendingMetadataAck: null, metadataAckResolver: null,
                pendingFileVerify: null, fileVerifyResolver: null,
                progressTicker: null,
                channelPaused: new Array(4).fill(false),
                channelResolvers: new Array(4).fill(null),
                fileResults: new Map(),
                activeTransfers: new Map(),
                retransmitRequests: new Map()
            },
            reception: {
                files: new Map(),
                startTime: null,
                lastProgressUpdate: 0,
                completedSize: 0,
                pendingIntegrityChecks: new Map()
            },
            receivedFiles: [],
            isTransferCancelled: false,
            isConnected: false, isConnecting: false,
            heartbeatInterval: null,
            nextFileId: 1,
            selectedFiles: [],
            batchId: Date.now()
        };

        async function computeSHA256(blob) {
            const buffer = await blob.arrayBuffer();
            const wordArray = CryptoJS.lib.WordArray.create(buffer);
            return CryptoJS.SHA256(wordArray).toString(CryptoJS.enc.Hex);
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }

        function formatSpeed(bps) {
            if (bps < 1024) return Math.round(bps) + ' B/s';
            if (bps < 1048576) return (bps / 1024).toFixed(1) + ' KB/s';
            return (bps / 1048576).toFixed(1) + ' MB/s';
        }

        function formatTime(sec) {
            if (!isFinite(sec) || sec < 0) return '0s';
            if (sec < 60) return Math.round(sec) + 's';
            return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
        }

        function sanitize(s) { return s.replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 40) || 'peer'; }
        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        function showAlert(msg, type = 'info') {
            const div = document.getElementById('connection-status');
            div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-triangle' : 'info-circle'} me-1"></i> ${msg}`;
            div.className = `alert alert-${type} shadow-sm`;
            div.style.display = 'block';
            setTimeout(() => { if (div.style.display !== 'none') div.style.display = 'none'; }, 4000);
        }

        function updateBatchReport() {
            const results = STATE.transfer.fileResults;
            if (results.size === 0) return;

            let success = 0, failed = 0;
            const failedFiles = [];
            for (const [name, result] of results) {
                if (result.success) success++;
                else failedFiles.push({ name, reason: result.reason });
            }
            failed = failedFiles.length;
            const total = success + failed;

            document.getElementById('batch-report').style.display = 'block';
            document.getElementById('batch-stats').innerHTML = `
                <i class="fas fa-check-circle text-success"></i> Success: ${success} &nbsp;|&nbsp;
                <i class="fas fa-times-circle text-danger"></i> Failed: ${failed} &nbsp;|&nbsp;
                <i class="fas fa-file"></i> Total: ${total}
            `;

            const failedContainer = document.getElementById('failed-files-list');
            if (failedFiles.length > 0) {
                failedContainer.innerHTML = '<strong class="small text-danger">Failed transfers:</strong><ul class="small mb-0 mt-1">' +
                    failedFiles.map(f => `<li>${escapeHtml(f.name)} - ${f.reason}</li>`).join('') + '</ul>';
            } else {
                failedContainer.innerHTML = '<span class="small text-success">✓ All files transferred successfully!</span>';
            }
        }

        function connectWebSocket() {
            if (STATE.isConnecting || STATE.isConnected) { showAlert('Already connecting', 'warning'); return; }
            STATE.clientId = sanitize(document.getElementById('client-id').value.trim());
            if (!STATE.clientId) { showAlert('Enter device name', 'danger'); return; }

            const connectBtn = document.getElementById('connect-btn');
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Connecting...';
            STATE.isConnecting = true;

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws/${STATE.clientId}`;
            STATE.ws = new WebSocket(wsUrl);

            STATE.ws.onopen = () => {
                document.getElementById('connect-btn').style.display = 'none';
                document.getElementById('disconnect-btn').style.display = 'inline-block';
                document.getElementById('peers-container').style.display = 'block';
                STATE.isConnected = true; STATE.isConnecting = false;
                startHeartbeat();
                showAlert('Connected! Discovering peers...', 'success');
            };

            STATE.ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'peers') updatePeersList(data.peers);
                    else if (data.type === 'offer') { cleanupPeerConnection(); handleOffer(data); }
                    else if (data.type === 'answer') handleAnswer(data);
                    else if (data.type === 'ice') handleIceCandidate(data);
                } catch (err) { console.warn(err); }
            };

            STATE.ws.onclose = () => {
                cleanupConnection();
                if (!STATE.intentionalDisconnect) {
                    showAlert('Disconnected', 'info');
                    document.getElementById('connect-btn').disabled = false;
                    document.getElementById('connect-btn').style.display = 'inline-block';
                }
            };
        }

        function disconnectWebSocket() { STATE.intentionalDisconnect = true; if (STATE.ws) STATE.ws.close(); cleanupConnection(); }

        function updatePeersList(peers) {
            const container = document.getElementById('peers-list');
            const others = peers.filter(p => p !== STATE.clientId);
            document.getElementById('peer-count').innerText = others.length;
            if (!others.length) { container.innerHTML = '<div class="text-muted text-center p-3">✨ No other devices online</div>'; return; }
            container.innerHTML = '';
            others.forEach(peerId => {
                const div = document.createElement('div');
                div.className = 'list-group-item peer-item d-flex justify-content-between align-items-center rounded-4';
                div.innerHTML = `<div><i class="fas fa-mobile-alt me-2 text-primary"></i><strong>${escapeHtml(peerId)}</strong></div>
                                 <button class="btn btn-sm btn-primary rounded-pill px-3"><i class="fas fa-plug"></i> Connect</button>`;
                div.querySelector('button').addEventListener('click', () => initiateConnection(peerId));
                container.appendChild(div);
            });
        }

        function sendSignal(msg, to) { if (STATE.ws?.readyState === WebSocket.OPEN) STATE.ws.send(JSON.stringify({ to, message: msg })); }

        async function initiateConnection(peerId) {
            if (STATE.dataChannels.length && STATE.dataChannels[0]?.readyState === 'open') { showAlert('Already connected', 'info'); return; }
            cleanupPeerConnection();
            STATE.peerId = peerId;
            STATE.rtcPeer = new RTCPeerConnection(RTC_CONFIG);
            STATE.dataChannels = [];
            STATE.transfer.allChannelsReady = false;

            for (let i = 0; i < CONFIG.numChannels; i++) {
                const ch = STATE.rtcPeer.createDataChannel(`turbo_${i}`, { ordered: true });
                ch.binaryType = 'arraybuffer';
                ch.channelId = i;
                setupChannelEvents(ch, i);
                STATE.dataChannels.push(ch);
            }

            STATE.rtcPeer.onicecandidate = e => { if (e.candidate) sendSignal({ type: 'ice', ice: e.candidate }, STATE.peerId); };
            const offer = await STATE.rtcPeer.createOffer();
            await STATE.rtcPeer.setLocalDescription(offer);
            sendSignal({ type: 'offer', offer: STATE.rtcPeer.localDescription }, STATE.peerId);
            showAlert(`Connecting to ${peerId}...`, 'info');
        }

        async function handleOffer(data) {
            STATE.peerId = data.from;
            cleanupPeerConnection();
            STATE.rtcPeer = new RTCPeerConnection(RTC_CONFIG);
            STATE.dataChannels = [];
            STATE.rtcPeer.ondatachannel = (ev) => {
                const ch = ev.channel;
                ch.binaryType = 'arraybuffer';
                ch.channelId = STATE.dataChannels.length;
                setupChannelEvents(ch, ch.channelId);
                STATE.dataChannels.push(ch);
            };
            STATE.rtcPeer.onicecandidate = e => { if (e.candidate) sendSignal({ type: 'ice', ice: e.candidate }, STATE.peerId); };
            await STATE.rtcPeer.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await STATE.rtcPeer.createAnswer();
            await STATE.rtcPeer.setLocalDescription(answer);
            sendSignal({ type: 'answer', answer: STATE.rtcPeer.localDescription }, STATE.peerId);
        }

        function handleAnswer(data) { if (STATE.rtcPeer) STATE.rtcPeer.setRemoteDescription(new RTCSessionDescription(data.answer)).catch(console.error); }
        function handleIceCandidate(data) { if (STATE.rtcPeer) STATE.rtcPeer.addIceCandidate(new RTCIceCandidate(data.ice)).catch(console.error); }

        function setupChannelEvents(ch, id) {
            ch.onopen = () => {
                const allOpen = STATE.dataChannels.length === CONFIG.numChannels && STATE.dataChannels.every(c => c.readyState === 'open');
                if (allOpen && !STATE.transfer.allChannelsReady) {
                    STATE.transfer.allChannelsReady = true;
                    showAlert(`✅ ${CONFIG.numChannels}‑lane connection ready!`, 'success');
                    document.getElementById('transfer-section').style.display = 'block';
                    document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
                }
            };

            ch.onclose = () => {
                STATE.transfer.allChannelsReady = false;
                if (STATE.transfer.channelResolvers[id]) {
                    STATE.transfer.channelResolvers[id]();
                    STATE.transfer.channelResolvers[id] = null;
                }
            };

            ch.bufferedAmountLowThreshold = 512 * 1024;
            ch.onbufferedamountlow = () => {
                if (STATE.transfer.channelPaused[id] && STATE.transfer.channelResolvers[id]) {
                    STATE.transfer.channelPaused[id] = false;
                    STATE.transfer.channelResolvers[id]();
                    STATE.transfer.channelResolvers[id] = null;
                }
            };

            ch.onmessage = (ev) => handleDataMessage(ev, id);
        }

        async function sendWithBackpressure(channel, data, channelId) {
            if (channel.readyState !== 'open') throw new Error('Channel not open');
            if (channel.bufferedAmount >= CONFIG.maxBufferedAmountPerChannel) {
                STATE.transfer.channelPaused[channelId] = true;
                await new Promise((resolve) => {
                    STATE.transfer.channelResolvers[channelId] = resolve;
                    setTimeout(() => {
                        if (STATE.transfer.channelResolvers[channelId]) {
                            STATE.transfer.channelPaused[channelId] = false;
                            STATE.transfer.channelResolvers[channelId]();
                            STATE.transfer.channelResolvers[channelId] = null;
                        }
                    }, 3000);
                });
            }
            channel.send(data);
        }

        // ============= DATA RECEPTION (FIXED) =============
        function handleDataMessage(event, chId) {
            const data = event.data;
            if (typeof data === 'string') {
                try {
                    const msg = JSON.parse(data);
                    if (msg.type === 'file_metadata_parallel') handleFileMetadata(msg);
                    else if (msg.type === 'metadata_ack') handleMetadataAck(msg);
                    else if (msg.type === 'file_end_parallel') handleFileEnd(msg);
                    else if (msg.type === 'file_verify_complete') handleFileVerifyComplete(msg);
                    else if (msg.type === 'retransmit_request') handleRetransmitRequest(msg);
                    else if (msg.type === 'integrity_verified') handleIntegrityVerified(msg);
                    else if (msg.type === 'cancel_transfer') cancelTransfer(true);
                } catch (e) { console.warn(e); }
                return;
            }
            if (data instanceof ArrayBuffer) handleBinaryChunk(data, chId);
        }

        function handleFileMetadata(data) {
            // Initialize file reception with proper structure
            STATE.reception.files.set(data.file_id, {
                metadata: data,
                chunks: new Map(),
                receivedSize: 0,
                expectedChunks: data.total_chunks,
                endMarkersReceived: new Set(),
                finalized: false,
                expectedHash: data.file_hash,
                lastChunkTime: Date.now(),
                fileName: data.file_name,
                fileSize: data.file_size
            });

            if (!STATE.reception.startTime) STATE.reception.startTime = Date.now();

            document.getElementById('transfer-info').style.display = 'block';
            document.getElementById('file-info').innerHTML = `<i class="fas fa-download text-primary"></i> Receiving: ${escapeHtml(data.file_name)} (${formatFileSize(data.file_size)}) <span class="badge bg-info">SHA-256</span>`;

            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';

            // Send ACK
            if (STATE.dataChannels[0]?.readyState === 'open') {
                STATE.dataChannels[0].send(JSON.stringify({ type: 'metadata_ack', file_id: data.file_id }));
            }
            document.getElementById('received-files-section').style.display = 'block';
        }

        function handleBinaryChunk(buf, chId) {
            const view = new DataView(buf);
            const fileId = view.getUint32(0, true);
            const seq = view.getUint32(4, true);
            const chunkData = buf.slice(8);

            let file = STATE.reception.files.get(fileId);
            if (!file || file.finalized) return;

            // Store chunk only if not already received
            if (!file.chunks.has(seq)) {
                file.chunks.set(seq, new Uint8Array(chunkData));
                file.receivedSize += chunkData.byteLength;
                file.lastChunkTime = Date.now();
            }

            // Update progress
            const percent = (file.receivedSize / file.metadata.file_size) * 100;
            const now = Date.now();

            if (now - STATE.reception.lastProgressUpdate > 100 || percent >= 100) {
                const progressBar = document.getElementById('progress-bar');
                progressBar.style.width = `${percent}%`;
                progressBar.textContent = `${Math.round(percent)}%`;
                document.getElementById('progress-text').textContent = `${Math.round(percent)}%`;

                if (STATE.reception.startTime && file.receivedSize > 0) {
                    const elapsed = (Date.now() - STATE.reception.startTime) / 1000;
                    if (elapsed > 0) {
                        const speed = file.receivedSize / elapsed;
                        document.getElementById('transfer-speed').innerHTML = formatSpeed(speed);
                        const remaining = (file.metadata.file_size - file.receivedSize) / speed;
                        document.getElementById('time-remaining').innerHTML = `Left: ${formatTime(remaining)}`;
                    }
                }
                STATE.reception.lastProgressUpdate = now;
            }
        }

        function checkMissingChunks(fileId) {
            const file = STATE.reception.files.get(fileId);
            if (!file || file.finalized) return;

            const missing = [];
            for (let i = 0; i < file.expectedChunks; i++) {
                if (!file.chunks.has(i)) missing.push(i);
            }

            if (missing.length > 0 && missing.length < file.expectedChunks) {
                console.log(`Requesting ${missing.length} missing chunks for file ${fileId}`);
                if (STATE.dataChannels[0]?.readyState === 'open') {
                    STATE.dataChannels[0].send(JSON.stringify({
                        type: 'retransmit_request',
                        file_id: fileId,
                        missing_chunks: missing
                    }));
                }
                return true;
            }
            return false;
        }

        function handleRetransmitRequest(msg) {
            const activeTransfer = STATE.transfer.activeTransfers.get(msg.file_id);
            if (activeTransfer && activeTransfer.chunks) {
                console.log(`Retransmitting ${msg.missing_chunks.length} chunks for file ${msg.file_id}`);
                for (const seq of msg.missing_chunks) {
                    const chunkData = activeTransfer.chunks.get(seq);
                    if (chunkData) {
                        const channel = STATE.dataChannels[seq % CONFIG.numChannels];
                        if (channel.readyState === 'open') {
                            channel.send(chunkData);
                        }
                    }
                }
            }
        }

        async function handleFileEnd(data) {
            const file = STATE.reception.files.get(data.file_id);
            if (!file || file.finalized) return;

            file.endMarkersReceived.add(data.channel_id);

            // Wait for all channels to signal end OR timeout
            if (file.endMarkersReceived.size < CONFIG.numChannels) {
                // Set timeout to proceed anyway after delay
                setTimeout(() => {
                    const currentFile = STATE.reception.files.get(data.file_id);
                    if (currentFile && !currentFile.finalized) {
                        console.log(`Timeout waiting for all end markers, proceeding with verification for ${currentFile.fileName}`);
                        finalizeAndVerifyFile(data.file_id);
                    }
                }, 5000);
                return;
            }

            finalizeAndVerifyFile(data.file_id);
        }

        async function finalizeAndVerifyFile(fileId) {
            const file = STATE.reception.files.get(fileId);
            if (!file || file.finalized) return;

            // Wait a bit for any late chunks
            await new Promise(r => setTimeout(r, 500));

            // Check for missing chunks and request them
            let hasMissing = checkMissingChunks(fileId);

            if (hasMissing) {
                // Wait for retransmitted chunks
                let retryCount = 0;
                const maxRetries = 5;

                while (hasMissing && retryCount < maxRetries) {
                    await new Promise(r => setTimeout(r, 2000));
                    hasMissing = checkMissingChunks(fileId);
                    retryCount++;
                }

                // Final check
                hasMissing = checkMissingChunks(fileId);
                if (hasMissing) {
                    console.error(`File ${file.fileName} still missing chunks after retries`);
                    showAlert(`File ${file.fileName} has missing chunks, transfer may be incomplete`, 'warning');
                }
            }

            // Reassemble file from chunks
            const parts = [];
            let hasAllChunks = true;

            for (let i = 0; i < file.expectedChunks; i++) {
                const chunk = file.chunks.get(i);
                if (!chunk) {
                    hasAllChunks = false;
                    console.error(`Missing chunk ${i} for file ${file.fileName}`);
                    continue;
                }
                parts.push(chunk);
            }

            if (!hasAllChunks) {
                showAlert(`File ${file.fileName} has missing chunks, transfer failed`, 'danger');
                STATE.reception.files.delete(fileId);
                return;
            }

            // Create blob and verify hash
            const blob = new Blob(parts, { type: file.metadata.mime_type || 'application/octet-stream' });
            const computedHash = await computeSHA256(blob);
            const isValid = (computedHash === file.expectedHash);

            if (isValid) {
                const url = URL.createObjectURL(blob);
                STATE.receivedFiles.push({
                    fileName: file.metadata.file_name,
                    blob,
                    url,
                    size: blob.size,
                    hash: computedHash,
                    timestamp: Date.now()
                });

                const card = document.createElement('div');
                card.className = 'file-card success';
                card.innerHTML = `<div class="d-flex justify-content-between align-items-center"><div><strong>${escapeHtml(file.metadata.file_name)}</strong><div class="small text-secondary">${formatFileSize(blob.size)} <i class="fas fa-check-circle text-success ms-1"></i> Verified</div></div><a href="${url}" download="${escapeHtml(file.metadata.file_name)}" class="btn btn-sm btn-outline-primary rounded-pill"><i class="fas fa-save"></i> Save</a></div>`;
                document.getElementById('received-files').appendChild(card);
                document.getElementById('download-all-btn').style.display = 'block';
                document.getElementById('clear-received-btn').style.display = 'inline-block';

                // Send verification success to sender
                if (STATE.dataChannels[0]?.readyState === 'open') {
                    STATE.dataChannels[0].send(JSON.stringify({
                        type: 'integrity_verified',
                        file_id: fileId,
                        success: true,
                        file_name: file.metadata.file_name
                    }));
                }

                showAlert(`✅ Received and verified: ${file.metadata.file_name}`, 'success');
            } else {
                showAlert(`❌ Hash mismatch for ${file.metadata.file_name}!`, 'danger');
                if (STATE.dataChannels[0]?.readyState === 'open') {
                    STATE.dataChannels[0].send(JSON.stringify({
                        type: 'integrity_verified',
                        file_id: fileId,
                        success: false,
                        file_name: file.metadata.file_name
                    }));
                }
            }

            file.finalized = true;
            STATE.reception.files.delete(fileId);
        }

        function handleIntegrityVerified(msg) {
            if (STATE.transfer.pendingFileVerify === msg.file_id && STATE.transfer.fileVerifyResolver) {
                if (msg.success) {
                    STATE.transfer.fileVerifyResolver({ success: true });
                } else {
                    STATE.transfer.fileVerifyResolver({ success: false, error: 'Hash mismatch on receiver' });
                }
                STATE.transfer.pendingFileVerify = null;
                STATE.transfer.fileVerifyResolver = null;
            }
        }

        function handleMetadataAck(msg) {
            if (STATE.transfer.pendingMetadataAck === msg.file_id && STATE.transfer.metadataAckResolver) {
                STATE.transfer.metadataAckResolver();
                STATE.transfer.pendingMetadataAck = null;
                STATE.transfer.metadataAckResolver = null;
            }
        }

        function handleFileVerifyComplete(msg) {
            // This can be used for additional verification if needed
        }

        // ============= SENDER (FIXED) =============
        async function sendFiles() {
            if (!STATE.transfer.allChannelsReady) { showAlert('Wait for connection', 'warning'); return; }
            if (!STATE.selectedFiles.length) { showAlert('Select files first', 'warning'); return; }

            STATE.transfer.queue = [...STATE.selectedFiles];
            STATE.transfer.totalSize = STATE.transfer.queue.reduce((s, f) => s + f.size, 0);
            STATE.transfer.transferredSize = 0;
            STATE.transfer.completedSize = 0;
            STATE.transfer.startTime = Date.now();
            STATE.transfer.currentFileIdx = 0;
            STATE.transfer.sendingActive = true;
            STATE.isTransferCancelled = false;
            STATE.transfer.fileResults.clear();
            STATE.batchId = Date.now();

            document.getElementById('cancel-btn').style.display = 'inline-block';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('transfer-info').style.display = 'block';
            document.getElementById('batch-report').style.display = 'none';
            await processNextFile();
        }

        async function processNextFile() {
            if (STATE.transfer.queue.length === 0 || STATE.isTransferCancelled) {
                if (!STATE.isTransferCancelled && STATE.transfer.currentFileIdx > 0) {
                    const totalTime = (Date.now() - STATE.transfer.startTime) / 1000;
                    const avg = STATE.transfer.totalSize / totalTime;
                    document.getElementById('file-info').innerHTML = `<i class="fas fa-check-circle text-success"></i> Transfer complete! ${STATE.transfer.currentFileIdx} file(s) processed`;
                    document.getElementById('transfer-speed').innerHTML = formatSpeed(avg);
                    document.getElementById('time-remaining').innerHTML = `✔️ ${formatTime(totalTime)}`;
                    updateBatchReport();

                    const successCount = Array.from(STATE.transfer.fileResults.values()).filter(r => r.success).length;
                    if (successCount === STATE.transfer.currentFileIdx) {
                        showAlert(`✅ All ${STATE.transfer.currentFileIdx} files transferred successfully!`, 'success');
                    } else {
                        showAlert(`⚠️ ${successCount}/${STATE.transfer.currentFileIdx} files succeeded. Check report.`, 'warning');
                    }

                    STATE.selectedFiles = [];
                    renderSelectedFiles();
                }
                if (STATE.transfer.progressTicker) clearInterval(STATE.transfer.progressTicker);
                document.getElementById('cancel-btn').style.display = 'none';
                document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
                STATE.transfer.sendingActive = false;
                STATE.transfer.activeTransfers.clear();
                return;
            }
            STATE.transfer.currentFile = STATE.transfer.queue.shift();
            STATE.transfer.currentFileIdx++;
            STATE.transfer.currentFileSize = STATE.transfer.currentFile.size;
            const totalFiles = STATE.transfer.queue.length + STATE.transfer.currentFileIdx;
            await sendSingleFile(STATE.transfer.currentFile, STATE.transfer.currentFileIdx, totalFiles);
        }

        function updateProgressUI(perFileFrac, idx, totalFiles, overallFrac = null) {
            const percent = Math.min(100, Math.round(perFileFrac * 100));
            const mainBar = document.getElementById('progress-bar');
            mainBar.style.width = `${percent}%`;
            mainBar.textContent = `${percent}%`;

            const overallRow = document.getElementById('overall-progress-row');
            const overallBar = document.getElementById('overall-bar');
            if (totalFiles > 1 && overallFrac !== null && overallFrac >= 0) {
                overallRow.style.display = 'block';
                const overallPercent = Math.min(100, Math.round(overallFrac * 100));
                overallBar.style.width = `${overallPercent}%`;
                document.getElementById('overall-label').innerHTML = `Overall ${overallPercent}% (${idx}/${totalFiles} files)`;
            } else {
                overallRow.style.display = 'none';
            }
            document.getElementById('progress-text').textContent = `${percent}%`;
        }

        async function sendSingleFile(file, idx, totalFiles) {
            document.getElementById('file-info').innerHTML = `<i class="fas fa-upload"></i> Sending: ${escapeHtml(file.name)} (${formatFileSize(file.size)}) <span class="badge bg-info">Hashing...</span>`;

            const fileBlob = file.slice(0, file.size, file.type);
            const fileHash = await computeSHA256(fileBlob);

            document.getElementById('file-info').innerHTML = `<i class="fas fa-upload"></i> Sending: ${escapeHtml(file.name)} (${formatFileSize(file.size)}) <span class="badge bg-success">SHA-256 ready</span>`;

            const fileId = STATE.nextFileId++;
            const chunkSize = CONFIG.chunkSize;
            const totalChunks = Math.ceil(file.size / chunkSize);

            const chunksMap = new Map();
            for (let i = 0; i < totalChunks && !STATE.isTransferCancelled; i++) {
                const start = i * chunkSize;
                const end = Math.min(start + chunkSize, file.size);
                const chunkBuffer = await file.slice(start, end).arrayBuffer();
                const framed = new Uint8Array(8 + chunkBuffer.byteLength);
                new DataView(framed.buffer).setUint32(0, fileId, true);
                new DataView(framed.buffer).setUint32(4, i, true);
                framed.set(new Uint8Array(chunkBuffer), 8);
                chunksMap.set(i, framed.buffer);
            }

            STATE.transfer.activeTransfers.set(fileId, { chunks: chunksMap, name: file.name });

            const metadata = {
                type: 'file_metadata_parallel',
                file_id: fileId,
                file_name: file.name,
                file_size: file.size,
                mime_type: file.type || 'application/octet-stream',
                total_chunks: totalChunks,
                current_index: idx,
                total_files: totalFiles,
                file_hash: fileHash
            };

            const mainChannel = STATE.dataChannels[0];
            while (mainChannel.readyState !== 'open' && !STATE.isTransferCancelled) await new Promise(r => setTimeout(r, 30));

            // Wait for metadata ACK
            STATE.transfer.pendingMetadataAck = fileId;
            const metadataAckPromise = new Promise(resolve => { STATE.transfer.metadataAckResolver = resolve; });
            mainChannel.send(JSON.stringify(metadata));
            await Promise.race([metadataAckPromise, new Promise(r => setTimeout(r, 5000))]);
            STATE.transfer.pendingMetadataAck = null;
            STATE.transfer.metadataAckResolver = null;

            // Progress tracking
            const progressTicker = setInterval(() => {
                if (!STATE.transfer.sendingActive || STATE.isTransferCancelled) return;
                const currentSent = Math.max(0, STATE.transfer.transferredSize - STATE.transfer.completedSize);
                const perFileFrac = Math.min(1, currentSent / STATE.transfer.currentFileSize);
                const overallFrac = (STATE.transfer.completedSize + currentSent) / STATE.transfer.totalSize;
                updateProgressUI(perFileFrac, idx, totalFiles, overallFrac);

                const elapsed = (Date.now() - STATE.transfer.startTime) / 1000;
                if (elapsed > 0 && STATE.transfer.transferredSize > 0) {
                    const speed = STATE.transfer.transferredSize / elapsed;
                    document.getElementById('transfer-speed').innerHTML = formatSpeed(speed);
                    const remaining = (STATE.transfer.totalSize - STATE.transfer.transferredSize) / speed;
                    document.getElementById('time-remaining').innerHTML = `⏱️ ${formatTime(remaining)}`;
                }

                let totalBuf = 0, open = 0;
                for (const ch of STATE.dataChannels) {
                    if (ch.readyState === 'open') {
                        totalBuf += ch.bufferedAmount || 0;
                        open++;
                    }
                }
                document.getElementById('channel-stats').innerHTML = `📦 Buffer: ${formatFileSize(totalBuf)} | ${open}/${CONFIG.numChannels} lanes`;
            }, CONFIG.progressUpdateInterval);
            STATE.transfer.progressTicker = progressTicker;

            // Send all chunks
            for (let i = 0; i < totalChunks && !STATE.isTransferCancelled; i++) {
                const chIdx = i % CONFIG.numChannels;
                let channel = STATE.dataChannels[chIdx];
                while (channel.readyState !== 'open' && !STATE.isTransferCancelled) await new Promise(r => setTimeout(r, 10));
                if (STATE.isTransferCancelled) break;

                await sendWithBackpressure(channel, chunksMap.get(i), chIdx);
                STATE.transfer.transferredSize += chunksMap.get(i).byteLength - 8;
            }

            if (STATE.isTransferCancelled) {
                if (progressTicker) clearInterval(progressTicker);
                STATE.transfer.activeTransfers.delete(fileId);
                return;
            }

            // Drain buffers
            let drainStart = Date.now();
            while (!STATE.isTransferCancelled && (Date.now() - drainStart) < 30000) {
                let totalBuf = 0;
                for (const ch of STATE.dataChannels) totalBuf += ch.bufferedAmount || 0;
                if (totalBuf === 0) break;
                await new Promise(r => setTimeout(r, 100));
            }

            STATE.transfer.completedSize += STATE.transfer.currentFileSize;
            STATE.transfer.transferredSize = STATE.transfer.completedSize;

            // Send end markers on all channels
            for (let ch = 0; ch < STATE.dataChannels.length; ch++) {
                if (STATE.dataChannels[ch].readyState === 'open') {
                    STATE.dataChannels[ch].send(JSON.stringify({
                        type: 'file_end_parallel',
                        file_id: fileId,
                        total_chunks: totalChunks,
                        file_size: file.size,
                        channel_id: ch
                    }));
                }
            }

            // Wait for verification from receiver
            STATE.transfer.pendingFileVerify = fileId;
            let verificationResult;
            try {
                verificationResult = await Promise.race([
                    new Promise(resolve => { STATE.transfer.fileVerifyResolver = resolve; }),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Verification timeout (90s)')), 90000))
                ]);
            } catch (e) {
                console.warn(`File ${file.name} verification timeout: ${e.message}`);
                verificationResult = { success: false, error: e.message };
            }

            const success = verificationResult && verificationResult.success;

            STATE.transfer.fileResults.set(file.name, {
                success: success,
                size: file.size,
                reason: success ? 'Verified by receiver' : (verificationResult?.error || 'Verification failed'),
                hash: fileHash
            });

            STATE.transfer.pendingFileVerify = null;
            STATE.transfer.fileVerifyResolver = null;
            STATE.transfer.activeTransfers.delete(fileId);

            if (progressTicker) clearInterval(progressTicker);
            STATE.transfer.progressTicker = null;

            await processNextFile();
        }

        function cancelTransfer(fromRemote = false) {
            STATE.isTransferCancelled = true;
            STATE.transfer.sendingActive = false;
            if (STATE.transfer.progressTicker) clearInterval(STATE.transfer.progressTicker);
            if (!fromRemote && STATE.dataChannels.length) {
                for (const ch of STATE.dataChannels) if (ch.readyState === 'open') try { ch.send(JSON.stringify({ type: 'cancel_transfer' })); } catch (e) { }
            }
            showAlert('Transfer cancelled', 'warning');
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
            document.getElementById('transfer-info').style.display = 'none';
        }

        // ============= UI =============
        function setupDropZone() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => { addFiles(e.target.files); fileInput.value = ''; });
            ['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }));
            ['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }));
            dropZone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
        }

        function addFiles(list) {
            for (let f of Array.from(list)) {
                if (!STATE.selectedFiles.some(ex => ex.name === f.name && ex.size === f.size)) STATE.selectedFiles.push(f);
            }
            renderSelectedFiles();
            if (STATE.transfer.allChannelsReady) document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
        }

        function renderSelectedFiles() {
            const container = document.getElementById('selected-files');
            if (!STATE.selectedFiles.length) { container.innerHTML = ''; return; }
            const total = STATE.selectedFiles.reduce((s, f) => s + f.size, 0);
            let html = `<div class="fw-semibold small">📁 ${STATE.selectedFiles.length} files · ${formatFileSize(total)}</div><div class="mt-1">`;
            STATE.selectedFiles.forEach((f, i) => {
                html += `<div class="d-flex justify-content-between align-items-center border-bottom py-1"><span class="text-truncate" style="max-width: 70%;">📄 ${escapeHtml(f.name)} (${formatFileSize(f.size)})</span><button class="btn btn-sm btn-link text-danger p-0" data-idx="${i}"><i class="fas fa-times-circle"></i></button></div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
            container.querySelectorAll('button[data-idx]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); STATE.selectedFiles.splice(parseInt(btn.dataset.idx), 1); renderSelectedFiles(); if (STATE.transfer.allChannelsReady) document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0); }));
        }

        function clearReceivedFiles() {
            if (!confirm(`Clear ${STATE.receivedFiles.length} received files?`)) return;
            STATE.receivedFiles.forEach(f => URL.revokeObjectURL(f.url));
            STATE.receivedFiles = [];
            document.getElementById('received-files').innerHTML = '';
            document.getElementById('download-all-btn').style.display = 'none';
            document.getElementById('clear-received-btn').style.display = 'none';
        }

        async function downloadAllFiles() {
            if (!STATE.receivedFiles.length) return;
            const btn = document.getElementById('download-all-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Zipping...';
            try {
                const zip = new JSZip();
                for (const f of STATE.receivedFiles) {
                    zip.file(f.fileName, f.blob);
                }
                const blob = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `verified_transfer_${STATE.batchId}.zip`; a.click();
                setTimeout(() => URL.revokeObjectURL(url), 2000);
                showAlert(`ZIP created with ${STATE.receivedFiles.length} verified files`, 'success');
            } catch (e) { showAlert('ZIP failed: ' + e.message, 'danger'); } finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-zipper"></i> ZIP all (verified)'; }
        }

        function startHeartbeat() { if (STATE.heartbeatInterval) clearInterval(STATE.heartbeatInterval); STATE.heartbeatInterval = setInterval(() => { if (STATE.ws?.readyState === WebSocket.OPEN) STATE.ws.send(JSON.stringify({ type: 'heartbeat' })); }, CONFIG.heartbeatInterval); }

        function cleanupPeerConnection() {
            if (STATE.transfer.progressTicker) clearInterval(STATE.transfer.progressTicker);
            for (let ch of STATE.dataChannels) try { ch.close(); } catch (e) { }
            STATE.dataChannels = [];
            if (STATE.rtcPeer) try { STATE.rtcPeer.close(); } catch (e) { }
            STATE.rtcPeer = null;
            STATE.transfer.sendingActive = false;
            STATE.transfer.allChannelsReady = false;
        }

        function cleanupConnection() {
            cleanupPeerConnection();
            if (STATE.ws) try { STATE.ws.close(); } catch (e) { }
            STATE.ws = null;
            if (STATE.heartbeatInterval) clearInterval(STATE.heartbeatInterval);
            STATE.isConnected = false; STATE.isConnecting = false;
            document.getElementById('connect-btn').style.display = 'inline-block';
            document.getElementById('connect-btn').disabled = false;
            document.getElementById('connect-btn').innerHTML = '<i class="fas fa-wifi"></i> Discover';
            document.getElementById('disconnect-btn').style.display = 'none';
            document.getElementById('peers-container').style.display = 'none';
            document.getElementById('transfer-section').style.display = 'none';
            document.getElementById('connection-status').style.display = 'none';
            document.getElementById('send-btn').disabled = true;
        }

        document.getElementById('clear-report-btn')?.addEventListener('click', () => {
            STATE.transfer.fileResults.clear();
            document.getElementById('batch-report').style.display = 'none';
        });

        window.addEventListener('beforeunload', (e) => {
            if (STATE.transfer.sendingActive) { e.preventDefault(); e.returnValue = 'Transfer in progress'; return e.returnValue; }
            STATE.receivedFiles.forEach(f => URL.revokeObjectURL(f.url));
        });

        document.getElementById('client-id').value = 'Device-' + Math.floor(Math.random() * 1000);
        document.getElementById('send-btn').addEventListener('click', sendFiles);
        document.getElementById('cancel-btn').addEventListener('click', () => cancelTransfer(false));
        document.getElementById('clear-received-btn').addEventListener('click', clearReceivedFiles);
        document.getElementById('download-all-btn').addEventListener('click', downloadAllFiles);
        document.getElementById('connect-btn').addEventListener('click', connectWebSocket);
        document.getElementById('disconnect-btn').addEventListener('click', disconnectWebSocket);
        setupDropZone();
    </script>
</body>

</html>
