<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>P2P File Transfer — Streaming | 5GB Support</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px !important;
            }
        }

        .card {
            border-radius: 28px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: none;
            background: rgba(255, 255, 255, 0.98);
        }

        .card-header {
            background: linear-gradient(105deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 1.4rem 2rem;
            border: none;
        }

        .progress {
            height: 32px;
            border-radius: 20px;
            background: #eef2ff;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3b82f6 0%, #a855f7 100%);
            transition: width 0.1s ease;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-sm {
            height: 8px;
            border-radius: 4px;
        }

        .file-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 5px solid #3b82f6;
            transition: all 0.15s;
        }

        .file-card.success {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }

        #received-files {
            max-height: 380px;
            overflow-y: auto;
        }

        .drop-zone {
            border: 2px dashed #818cf8;
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            background: #fefce8;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            background: #eef2ff;
            border-color: #a855f7;
        }

        .peer-item {
            border-radius: 60px !important;
            margin-bottom: 8px;
            background: #ffffff;
            transition: all 0.1s;
        }

        .peer-item:hover {
            background: #ede9fe;
            transform: translateX(4px);
        }

        .batch-report {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
            font-size: 13px;
        }

        .speed-row {
            background: #eff6ff;
            border-radius: 10px;
            padding: 6px 10px;
            margin-top: 6px;
            font-size: 12px;
        }

        .verification-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header text-white">
                <h3 class="mb-0"><i class="fas fa-shield-alt me-2"></i> P2P File Transfer</h3>
                <small class="text-white-50">Streaming Hash · 5GB Support · Bounded RAM</small>
            </div>

            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label class="fw-semibold"><i class="fas fa-user-astronaut"></i> Your Device:</label>
                            <input type="text" id="client-id" class="form-control rounded-pill">
                        </div>
                        <div class="d-flex gap-3 mb-3">
                            <button id="connect-btn" class="btn btn-primary px-4 rounded-pill">
                                <i class="fas fa-wifi"></i> Discover
                            </button>
                            <button id="disconnect-btn" class="btn btn-outline-danger rounded-pill px-4"
                                style="display:none;">
                                <i class="fas fa-power-off"></i> Disconnect
                            </button>
                        </div>
                        <div id="connection-status" class="alert" style="display:none;"></div>
                        <div id="batch-report" class="batch-report" style="display:none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <strong><i class="fas fa-clipboard-list"></i> Transfer Report</strong>
                                <button id="clear-report-btn"
                                    class="btn btn-sm btn-link text-secondary p-0">Clear</button>
                            </div>
                            <div id="batch-stats" class="small"></div>
                            <div id="failed-files-list" class="mt-2" style="max-height: 150px; overflow-y: auto;"></div>
                        </div>
                    </div>

                    <div class="col-md-6" id="peers-container" style="display:none;">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold"><i class="fas fa-user-friends me-1"></i> Nearby devices</h5>
                            <span class="badge bg-light text-dark rounded-pill" id="peer-count">0</span>
                        </div>
                        <div id="peers-list" class="mb-3" style="max-height: 210px; overflow-y: auto;"></div>

                        <div id="transfer-section" style="display:none;">
                            <hr class="my-3">
                            <h5 class="fw-bold"><i class="fas fa-paper-plane me-2"></i> Send files</h5>
                            <div id="drop-zone" class="drop-zone">
                                <div class="icon"><i class="fas fa-cloud-upload-alt fa-2x text-primary"></i></div>
                                <div class="mt-1"><strong>Drop files anywhere</strong></div>
                                <small class="text-secondary">Supports up to 5GB · SHA-256 verified · Streaming</small>
                                <input type="file" id="file-input" multiple style="display:none;">
                                <div id="selected-files" class="selected-files mt-2"></div>
                            </div>
                            <div class="d-flex gap-3 mt-2">
                                <button id="send-btn" class="btn btn-success rounded-pill px-4 fw-semibold" disabled>
                                    <i class="fas fa-rocket"></i> Send now
                                </button>
                                <button id="cancel-btn" class="btn btn-outline-danger rounded-pill px-4"
                                    style="display:none;">
                                    <i class="fas fa-ban"></i> Cancel
                                </button>
                            </div>
                            <div id="transfer-info" class="mt-4 p-3 bg-light rounded-4" style="display:none;">
                                <div id="file-info" class="small fw-semibold mb-2"></div>
                                <div class="progress mb-2">
                                    <div id="progress-bar" class="progress-bar" style="width: 0%">0%</div>
                                </div>
                                <div id="overall-progress-row" style="display: none;" class="mb-2">
                                    <div class="small text-secondary mb-1" id="overall-label">Overall:</div>
                                    <div class="progress progress-sm">
                                        <div id="overall-bar" class="progress-bar" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between flex-wrap gap-1">
                                    <span id="progress-text" class="fw-semibold">0%</span>
                                    <span id="transfer-speed" class="text-secondary"><i
                                            class="fas fa-tachometer-alt"></i> 0 B/s</span>
                                    <span id="time-remaining" class="text-secondary"><i class="far fa-clock"></i>
                                        --</span>
                                </div>
                                <div id="speed-breakdown" class="speed-row">
                                    <span id="net-speed">🌐 Network: --</span> &nbsp;|&nbsp;
                                    <span id="hash-time">⚡ Hash: streaming</span>
                                </div>
                                <div id="channel-stats" class="small text-muted mt-2"></div>
                            </div>
                        </div>

                        <div id="received-files-section" style="display:none;" class="mt-4">
                            <hr>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0"><i class="fas fa-inbox"></i> Received</h5>
                                <button id="clear-received-btn" class="btn btn-sm btn-outline-secondary rounded-pill"
                                    style="display:none;">
                                    <i class="fas fa-trash-alt"></i> Clear
                                </button>
                            </div>
                            <div id="received-files"></div>
                            <button id="download-all-btn" class="btn btn-secondary mt-2 rounded-pill"
                                style="display:none;">
                                <i class="fas fa-file-zipper"></i> ZIP all (verified)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        // =====================================================================
        // P2P FILE TRANSFER — STREAMING, BOUNDED RAM, 5GB CAPABLE
        // =====================================================================
        const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        // NOTE: chunkSize below is a *desired* max. The actual chunk size is clamped at
        // channel-open time to what the SCTP layer negotiated (pc.sctp.maxMessageSize).
        // Some browser combos negotiate as low as 64 KB (or even the 16 KB SCTP default).
        // Exceeding that limit causes an immediate "Failure to send data" + channel death.
        const CONFIG = {
            desiredChunkSize: 256 * 1024,     // target (used on capable peers)
            safeFallbackChunkSize: 16 * 1024, // SCTP universal safe floor
            headerBytes: 8,                   // fileId(4) + seq(4)
            safetyMargin: 128,                // subtract from negotiated max for SCTP overhead
            maxBufferedAmount: IS_MOBILE ? 4 * 1024 * 1024 : 8 * 1024 * 1024,
            bufferedAmountLowThreshold: IS_MOBILE ? 1 * 1024 * 1024 : 2 * 1024 * 1024,
            heartbeatInterval: 30000,
            progressUpdateInterval: 150,
            metadataAckTimeout: 15000,
            // In-flight window: mobile smaller cap to protect RAM; plenty for throughput.
            // (Measured in chunks; effective bytes = maxInflightChunks × chunkSize)
            maxInflightChunks: IS_MOBILE ? 8192 : 32768,
            flowControlAckEvery: 512,
            drainTimeoutMs: 60000,
            channelOpenWaitMs: 30000,
            backpressureWaitMs: 3000,
            // Completion ACK: receiver confirms each file fully persisted before sender moves on
            completionAckTimeout: 120000,
            // Retransmit control
            maxRetransmitRounds: 10,
            retransmitRoundWait: 3000,
            // File-end wait: activity-based
            stallDetectMs: 8000,
            MAX_FILE_SIZE: 5 * 1024 * 1024 * 1024
        };

        // Resolved at runtime after data channel opens. Starts at safe floor.
        let ACTIVE_CHUNK_SIZE = CONFIG.safeFallbackChunkSize;

        const RTC_CONFIG = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        const STATE = {
            ws: null, rtcPeer: null, dataChannel: null,
            clientId: null, peerId: null, intentionalDisconnect: false,
            transfer: {
                queue: [], currentFile: null, currentFileIdx: 0,
                totalSize: 0, transferredSize: 0, completedSize: 0,
                currentFileSize: 0, startTime: null,
                sendingActive: false, channelReady: false,
                pendingMetadataAck: null, metadataAckResolver: null,
                pendingFileVerify: null, fileVerifyResolver: null,
                progressTicker: null,
                channelPaused: false, channelResolver: null,
                fileResults: new Map(),
                flowControl: new Map(),
                activeFiles: new Map(),
                networkStartTime: null, networkBytes: 0,
                lastHashMs: 0
            },
            reception: {
                files: new Map(),
                startTime: null,
                lastProgressUpdate: 0
            },
            receivedFiles: [],
            isTransferCancelled: false,
            isConnected: false, isConnecting: false,
            heartbeatInterval: null,
            nextFileId: 1,
            selectedFiles: [],
            batchId: Date.now()
        };

        const dbg = {
            log: (msg, level = 'info') => {
                const fn = level === 'err' ? console.error : level === 'warn' ? console.warn : console.log;
                fn(`[${new Date().toLocaleTimeString()}] ${msg}`);
            },
            info: (m) => dbg.log(m, 'info'),
            warn: (m) => dbg.log(m, 'warn'),
            err: (m) => dbg.log(m, 'err')
        };

        // =====================================================================
        // STREAMING SHA-256 (pure JS, chunk-fed, bounded state)
        // =====================================================================
        class TurboSha256 {
            constructor() {
                this.h = new Uint32Array([
                    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
                    0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
                ]);
                this.k = new Uint32Array([
                    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
                ]);
                this.buffer = new Uint8Array(64);
                this.bufferLength = 0;
                this.totalLength = 0;
            }
            update(data) {
                this.totalLength += data.length;
                let offset = 0;
                if (this.bufferLength > 0) {
                    const need = 64 - this.bufferLength;
                    const take = Math.min(need, data.length);
                    this.buffer.set(data.subarray(0, take), this.bufferLength);
                    this.bufferLength += take;
                    offset = take;
                    if (this.bufferLength === 64) {
                        this._processBlock(this.buffer);
                        this.bufferLength = 0;
                    }
                }
                while (data.length - offset >= 64) {
                    this._processBlock(data.subarray(offset, offset + 64));
                    offset += 64;
                }
                if (offset < data.length) {
                    const rest = data.length - offset;
                    this.buffer.set(data.subarray(offset), 0);
                    this.bufferLength = rest;
                }
            }
            _processBlock(block) {
                const w = new Uint32Array(64);
                for (let i = 0; i < 16; i++) {
                    w[i] = (block[i * 4] << 24) | (block[i * 4 + 1] << 16) | (block[i * 4 + 2] << 8) | block[i * 4 + 3];
                }
                for (let i = 16; i < 64; i++) {
                    const s0 = (this._rotr(w[i - 15], 7) ^ this._rotr(w[i - 15], 18) ^ (w[i - 15] >>> 3));
                    const s1 = (this._rotr(w[i - 2], 17) ^ this._rotr(w[i - 2], 19) ^ (w[i - 2] >>> 10));
                    w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                }
                let a = this.h[0], b = this.h[1], c = this.h[2], d = this.h[3];
                let e = this.h[4], f = this.h[5], g = this.h[6], h = this.h[7];
                for (let i = 0; i < 64; i++) {
                    const S1 = this._rotr(e, 6) ^ this._rotr(e, 11) ^ this._rotr(e, 25);
                    const ch = (e & f) ^ ((~e) & g);
                    const temp1 = (h + S1 + ch + this.k[i] + w[i]) | 0;
                    const S0 = this._rotr(a, 2) ^ this._rotr(a, 13) ^ this._rotr(a, 22);
                    const maj = (a & b) ^ (a & c) ^ (b & c);
                    const temp2 = (S0 + maj) | 0;
                    h = g; g = f; f = e;
                    e = (d + temp1) | 0;
                    d = c; c = b; b = a;
                    a = (temp1 + temp2) | 0;
                }
                this.h[0] = (this.h[0] + a) | 0; this.h[1] = (this.h[1] + b) | 0;
                this.h[2] = (this.h[2] + c) | 0; this.h[3] = (this.h[3] + d) | 0;
                this.h[4] = (this.h[4] + e) | 0; this.h[5] = (this.h[5] + f) | 0;
                this.h[6] = (this.h[6] + g) | 0; this.h[7] = (this.h[7] + h) | 0;
            }
            _rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
            hex() {
                const bitLen = this.totalLength * 8;
                const padLen = this.bufferLength < 56 ? 64 - this.bufferLength : 128 - this.bufferLength;
                const pad = new Uint8Array(padLen);
                pad[0] = 0x80;
                const dv = new DataView(pad.buffer);
                const high = Math.floor(bitLen / 0x100000000);
                const low = bitLen >>> 0;
                dv.setUint32(padLen - 8, high, false);
                dv.setUint32(padLen - 4, low, false);
                this.update(pad);
                let hex = '';
                for (let i = 0; i < 8; i++) hex += this.h[i].toString(16).padStart(8, '0');
                return hex;
            }
        }

        // =====================================================================
        // SENDER HASH: always streaming, chunk-by-chunk from disk
        // No full-file arrayBuffer — safe for 5GB files even on mobile
        // =====================================================================
        async function computeFileHashStreaming(file, onProgress) {
            const startTime = performance.now();
            const hasher = new TurboSha256();
            const CHUNK = 4 * 1024 * 1024; // 4 MB read chunks for hashing speed
            let offset = 0;
            while (offset < file.size) {
                const end = Math.min(offset + CHUNK, file.size);
                const buf = await file.slice(offset, end).arrayBuffer();
                hasher.update(new Uint8Array(buf));
                offset = end;
                if (onProgress) onProgress(offset / file.size);
                // Yield every 32 MB to keep UI responsive on mobile
                if (offset % (32 * 1024 * 1024) === 0) {
                    await new Promise(r => setTimeout(r, 0));
                }
            }
            const hex = hasher.hex();
            const elapsed = performance.now() - startTime;
            dbg.info(`Hash ${file.name} (${formatFileSize(file.size)}): ${elapsed.toFixed(0)}ms`);
            return hex;
        }

        // =====================================================================
        // STREAMING CHUNK STORE — bounded RAM, disk-backed via Blob parts
        //
        // Strategy:
        //   - Every received chunk immediately wrapped as a tiny Blob.
        //     Multiple Blobs in an array = browser can (and does) page
        //     them to disk once total size exceeds ~100MB internal threshold.
        //   - Uint8Array reference to chunk bytes is released right after.
        //   - In-order chunks fed to streaming SHA-256 immediately.
        //   - Out-of-order chunks buffered in `pending` (rare with ordered
        //     channel; only during retransmit) until the gap fills.
        //   - Bitmap tracks received seqs. Duplicates silently dropped.
        // =====================================================================
        class StreamingChunkStore {
            constructor(fileId, expectedChunks, mimeType) {
                this.fileId = fileId;
                this.expectedChunks = expectedChunks;
                this.mimeType = mimeType;
                const bitmapBytes = Math.max(1, Math.ceil(expectedChunks / 8));
                this.received = new Uint8Array(bitmapBytes);
                this.receivedCount = 0;
                this.pending = new Map();     // seq -> Uint8Array (only out-of-order)
                this.nextSeq = 0;             // next in-order seq we expect to hash/blob
                this.blobParts = [];          // array of small Blobs, appended in order
                this.hasher = new TurboSha256();
                this.destroyed = false;
                this.finalized = false;
                this._pendingBytes = 0;       // to cap pending buffer memory
            }

            _markReceived(seq) {
                if (seq < 0 || seq >= this.expectedChunks) return false;
                const byte = seq >> 3, bit = 1 << (seq & 7);
                if (this.received[byte] & bit) return false; // duplicate
                this.received[byte] |= bit;
                this.receivedCount++;
                return true;
            }

            has(seq) {
                if (seq < 0 || seq >= this.expectedChunks) return true;
                return (this.received[seq >> 3] & (1 << (seq & 7))) !== 0;
            }

            // Called for every incoming chunk (new or retransmit)
            put(seq, bytes) {
                if (this.destroyed || this.finalized) return;
                if (!this._markReceived(seq)) return; // duplicate or out-of-range

                if (seq === this.nextSeq) {
                    // Consume in-order
                    this._consume(bytes);
                    // Drain any contiguous pending chunks
                    while (this.pending.has(this.nextSeq)) {
                        const next = this.pending.get(this.nextSeq);
                        this.pending.delete(this.nextSeq);
                        this._pendingBytes -= next.length;
                        this._consume(next);
                    }
                } else if (seq > this.nextSeq) {
                    // Buffer out-of-order
                    // Safety cap: if too much buffered (shouldn't happen with ordered channel),
                    // drop oldest — receiver will request retransmit later.
                    if (this._pendingBytes > 128 * 1024 * 1024) {
                        // find and drop lowest seq in pending (unlikely path)
                        const keys = Array.from(this.pending.keys()).sort((a, b) => a - b);
                        if (keys.length) {
                            const k = keys[0];
                            const dropped = this.pending.get(k);
                            this.pending.delete(k);
                            this._pendingBytes -= dropped.length;
                            // un-mark so retransmit will fill it
                            const byte = k >> 3, bit = 1 << (k & 7);
                            this.received[byte] &= ~bit;
                            this.receivedCount--;
                        }
                    }
                    this.pending.set(seq, bytes);
                    this._pendingBytes += bytes.length;
                }
                // seq < nextSeq but already marked received (handled by _markReceived duplicate check)
            }

            _consume(bytes) {
                // Hash this chunk (streaming — only ~200 bytes of SHA state held)
                this.hasher.update(bytes);
                // Wrap bytes in a Blob; this lets the browser page it to disk.
                // Creating a Blob from a Uint8Array is a reference in most engines,
                // but once pushed into blobParts we drop our own reference.
                this.blobParts.push(new Blob([bytes]));
                this.nextSeq++;
            }

            size() { return this.receivedCount; }

            missing() {
                if (this.destroyed) return [];
                const list = [];
                for (let i = 0; i < this.expectedChunks; i++) {
                    if (!this.has(i)) list.push(i);
                }
                return list;
            }

            // Returns { blob, hash }. Safe to call only when all chunks received.
            finalize() {
                if (this.destroyed) throw new Error('Store destroyed');
                if (this.finalized) throw new Error('Already finalized');
                if (this.nextSeq !== this.expectedChunks) {
                    throw new Error(`Incomplete: hashed ${this.nextSeq} of ${this.expectedChunks}`);
                }
                this.finalized = true;
                const hash = this.hasher.hex();
                const blob = new Blob(this.blobParts, { type: this.mimeType });
                // Release our refs to the part Blobs; the combined Blob holds refs internally.
                this.blobParts = null;
                this.pending.clear();
                this._pendingBytes = 0;
                return { blob, hash };
            }

            destroy() {
                this.destroyed = true;
                this.blobParts = null;
                this.pending.clear();
                this.received = null;
                this._pendingBytes = 0;
            }
        }

        // =====================================================================
        // UTILITIES
        // =====================================================================
        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }
        function formatSpeed(bps) {
            if (bps < 1024) return Math.round(bps) + ' B/s';
            if (bps < 1048576) return (bps / 1024).toFixed(1) + ' KB/s';
            return (bps / 1048576).toFixed(1) + ' MB/s';
        }
        function formatTime(sec) {
            if (!isFinite(sec) || sec < 0) return '0s';
            if (sec < 60) return Math.round(sec) + 's';
            if (sec < 3600) return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
            return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
        }
        function sanitize(s) { return s.replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 40) || 'peer'; }
        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        function showAlert(msg, type = 'info') {
            const div = document.getElementById('connection-status');
            const icon = type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-triangle' : 'info-circle';
            div.innerHTML = `<i class="fas fa-${icon} me-1"></i> ${msg}`;
            div.className = `alert alert-${type} shadow-sm`;
            div.style.display = 'block';
            setTimeout(() => { if (div.style.display !== 'none') div.style.display = 'none'; }, 4000);
        }

        function updateBatchReport() {
            const results = STATE.transfer.fileResults;
            if (results.size === 0) return;
            let success = 0;
            const failedFiles = [];
            for (const [name, result] of results) {
                if (result.success) success++;
                else failedFiles.push({ name, reason: result.reason });
            }
            const failed = failedFiles.length;
            const total = success + failed;
            document.getElementById('batch-report').style.display = 'block';
            document.getElementById('batch-stats').innerHTML = `
                <i class="fas fa-check-circle text-success"></i> Success: ${success} &nbsp;|&nbsp;
                <i class="fas fa-times-circle text-danger"></i> Failed: ${failed} &nbsp;|&nbsp;
                <i class="fas fa-file"></i> Total: ${total}`;
            const failedContainer = document.getElementById('failed-files-list');
            if (failedFiles.length > 0) {
                failedContainer.innerHTML = '<strong class="small text-danger">Failed:</strong><ul class="small mb-0 mt-1">' +
                    failedFiles.map(f => `<li>${escapeHtml(f.name)} - ${escapeHtml(f.reason)}</li>`).join('') + '</ul>';
            } else {
                failedContainer.innerHTML = '<span class="small text-success">✓ All files transferred!</span>';
            }
        }

        // =====================================================================
        // WEBRTC SIGNALING
        // =====================================================================
        function connectWebSocket() {
            if (STATE.isConnecting || STATE.isConnected) { showAlert('Already connecting', 'warning'); return; }
            STATE.clientId = sanitize(document.getElementById('client-id').value.trim());
            if (!STATE.clientId) { showAlert('Enter device name', 'danger'); return; }
            const connectBtn = document.getElementById('connect-btn');
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Connecting...';
            STATE.isConnecting = true;
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws/${STATE.clientId}`;
            STATE.ws = new WebSocket(wsUrl);
            STATE.ws.onopen = () => {
                document.getElementById('connect-btn').style.display = 'none';
                document.getElementById('disconnect-btn').style.display = 'inline-block';
                document.getElementById('peers-container').style.display = 'block';
                STATE.isConnected = true; STATE.isConnecting = false;
                startHeartbeat();
                dbg.info('WebSocket connected');
                showAlert('Connected! Discovering peers...', 'success');
            };
            STATE.ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'peers') updatePeersList(data.peers);
                    else if (data.type === 'offer') { cleanupPeerConnection(); handleOffer(data); }
                    else if (data.type === 'answer') handleAnswer(data);
                    else if (data.type === 'ice') handleIceCandidate(data);
                } catch (err) { dbg.warn('Bad signaling msg: ' + err.message); }
            };
            STATE.ws.onerror = () => dbg.err('WS error');
            STATE.ws.onclose = () => {
                dbg.info('WebSocket closed');
                cleanupConnection();
                if (!STATE.intentionalDisconnect) {
                    showAlert('Disconnected', 'info');
                    document.getElementById('connect-btn').disabled = false;
                    document.getElementById('connect-btn').style.display = 'inline-block';
                }
            };
        }

        function disconnectWebSocket() {
            STATE.intentionalDisconnect = true;
            if (STATE.ws) STATE.ws.close();
            cleanupConnection();
        }

        function updatePeersList(peers) {
            const container = document.getElementById('peers-list');
            const others = peers.filter(p => p !== STATE.clientId);
            document.getElementById('peer-count').innerText = others.length;
            if (!others.length) {
                container.innerHTML = '<div class="text-muted text-center p-3">✨ No other devices online</div>';
                return;
            }
            container.innerHTML = '';
            others.forEach(peerId => {
                const div = document.createElement('div');
                div.className = 'list-group-item peer-item d-flex justify-content-between align-items-center rounded-4';
                div.innerHTML = `<div><i class="fas fa-mobile-alt me-2 text-primary"></i><strong>${escapeHtml(peerId)}</strong></div>
                                 <button class="btn btn-sm btn-primary rounded-pill px-3"><i class="fas fa-plug"></i> Connect</button>`;
                div.querySelector('button').addEventListener('click', () => initiateConnection(peerId));
                container.appendChild(div);
            });
        }

        function sendSignal(msg, to) {
            if (STATE.ws?.readyState === WebSocket.OPEN)
                STATE.ws.send(JSON.stringify({ to, message: msg }));
        }

        async function initiateConnection(peerId) {
            if (STATE.dataChannel?.readyState === 'open') {
                showAlert('Already connected', 'info'); return;
            }
            cleanupPeerConnection();
            STATE.peerId = peerId;
            STATE.rtcPeer = new RTCPeerConnection(RTC_CONFIG);
            STATE.transfer.channelReady = false;
            const ch = STATE.rtcPeer.createDataChannel('p2p_transfer', { ordered: true });
            ch.binaryType = 'arraybuffer';
            setupChannel(ch);
            STATE.dataChannel = ch;
            STATE.rtcPeer.onicecandidate = e => {
                if (e.candidate) sendSignal({ type: 'ice', ice: e.candidate }, STATE.peerId);
            };
            const offer = await STATE.rtcPeer.createOffer();
            await STATE.rtcPeer.setLocalDescription(offer);
            sendSignal({ type: 'offer', offer: STATE.rtcPeer.localDescription }, STATE.peerId);
            dbg.info(`Offer sent to ${peerId}`);
            showAlert(`Connecting to ${peerId}...`, 'info');
        }

        async function handleOffer(data) {
            STATE.peerId = data.from;
            cleanupPeerConnection();
            STATE.rtcPeer = new RTCPeerConnection(RTC_CONFIG);
            STATE.rtcPeer.ondatachannel = (ev) => {
                const ch = ev.channel;
                ch.binaryType = 'arraybuffer';
                setupChannel(ch);
                STATE.dataChannel = ch;
                dbg.info('Received data channel from peer');
            };
            STATE.rtcPeer.onicecandidate = e => {
                if (e.candidate) sendSignal({ type: 'ice', ice: e.candidate }, STATE.peerId);
            };
            await STATE.rtcPeer.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await STATE.rtcPeer.createAnswer();
            await STATE.rtcPeer.setLocalDescription(answer);
            sendSignal({ type: 'answer', answer: STATE.rtcPeer.localDescription }, STATE.peerId);
            dbg.info(`Answer sent to ${data.from}`);
        }

        function handleAnswer(data) {
            if (STATE.rtcPeer)
                STATE.rtcPeer.setRemoteDescription(new RTCSessionDescription(data.answer))
                    .catch(e => dbg.err('setRemoteDesc: ' + e.message));
        }

        function handleIceCandidate(data) {
            if (STATE.rtcPeer)
                STATE.rtcPeer.addIceCandidate(new RTCIceCandidate(data.ice))
                    .catch(e => dbg.warn('addIce: ' + e.message));
        }

        // Determine safe chunk size from SCTP-negotiated max message size.
        // pc.sctp.maxMessageSize is 0 or undefined on some engines → fall back to safe floor.
        // Standard value for modern Chrome↔Chrome: 262144 (256 KB) or higher.
        // Conservative browsers / cross-browser: 65536 or 16384.
        function resolveActiveChunkSize() {
            let negotiated = 0;
            try {
                const sctp = STATE.rtcPeer && STATE.rtcPeer.sctp;
                if (sctp && typeof sctp.maxMessageSize === 'number') {
                    negotiated = sctp.maxMessageSize;
                }
            } catch (e) { }
            // Guard rails: treat 0/huge as unknown
            if (!negotiated || negotiated <= 0 || negotiated > 1073741824) {
                ACTIVE_CHUNK_SIZE = CONFIG.safeFallbackChunkSize;
                dbg.info(`Chunk size: ${ACTIVE_CHUNK_SIZE} B (fallback, SCTP max unknown)`);
                return;
            }
            const maxPayload = negotiated - CONFIG.headerBytes - CONFIG.safetyMargin;
            // Cap at our desired ceiling; floor at the safe fallback
            let resolved = Math.min(CONFIG.desiredChunkSize, maxPayload);
            if (resolved < CONFIG.safeFallbackChunkSize) {
                resolved = CONFIG.safeFallbackChunkSize;
            }
            // Round down to nearest 4 KB for cleanliness
            resolved = Math.floor(resolved / 4096) * 4096;
            if (resolved < CONFIG.safeFallbackChunkSize) resolved = CONFIG.safeFallbackChunkSize;
            ACTIVE_CHUNK_SIZE = resolved;
            dbg.info(`Chunk size: ${ACTIVE_CHUNK_SIZE} B (SCTP max=${negotiated})`);
        }

        function setupChannel(ch) {
            ch.onopen = () => {
                dbg.info(`DataChannel open`);
                resolveActiveChunkSize();
                STATE.transfer.channelReady = true;
                showAlert('✅ Connection ready!', 'success');
                document.getElementById('transfer-section').style.display = 'block';
                document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
            };
            ch.onclose = () => {
                dbg.warn(`DataChannel closed`);
                STATE.transfer.channelReady = false;
                if (STATE.transfer.channelResolver) {
                    const r = STATE.transfer.channelResolver;
                    STATE.transfer.channelResolver = null;
                    STATE.transfer.channelPaused = false;
                    r();
                }
            };
            ch.onerror = (e) => {
                dbg.err(`DataChannel error: ${e?.error?.message || 'unknown'}`);
            };
            ch.bufferedAmountLowThreshold = CONFIG.bufferedAmountLowThreshold;
            ch.onbufferedamountlow = () => {
                if (STATE.transfer.channelPaused && STATE.transfer.channelResolver) {
                    STATE.transfer.channelPaused = false;
                    const r = STATE.transfer.channelResolver;
                    STATE.transfer.channelResolver = null;
                    r();
                }
            };
            ch.onmessage = (ev) => handleDataMessage(ev);
        }

        async function safeSend(data) {
            const ch = STATE.dataChannel;
            if (!ch || ch.readyState !== 'open')
                throw new Error(`Channel not open`);
            if (ch.bufferedAmount >= CONFIG.maxBufferedAmount) {
                await waitForDrain();
                if (ch.readyState !== 'open') throw new Error('Channel closed');
            }
            ch.send(data);
        }

        async function waitForDrain() {
            const ch = STATE.dataChannel;
            if (!ch) return;
            if (ch.bufferedAmount < CONFIG.bufferedAmountLowThreshold) return;
            STATE.transfer.channelPaused = true;
            await new Promise((resolve) => {
                STATE.transfer.channelResolver = resolve;
                setTimeout(() => {
                    if (STATE.transfer.channelResolver === resolve) {
                        STATE.transfer.channelPaused = false;
                        STATE.transfer.channelResolver = null;
                        resolve();
                    }
                }, CONFIG.backpressureWaitMs);
            });
        }

        async function waitForChannelOpen(maxMs = CONFIG.channelOpenWaitMs) {
            const ch = STATE.dataChannel;
            if (!ch) throw new Error('No data channel');
            if (ch.readyState === 'open') return;
            const start = Date.now();
            while (Date.now() - start < maxMs) {
                if (STATE.isTransferCancelled) throw new Error('Cancelled');
                if (STATE.dataChannel?.readyState === 'open') return;
                if (STATE.dataChannel && ['closed', 'closing'].includes(STATE.dataChannel.readyState))
                    throw new Error(`Channel closed`);
                await new Promise(r => setTimeout(r, 100));
            }
            throw new Error(`Channel did not open`);
        }

        // =====================================================================
        // MESSAGE ROUTER
        // =====================================================================
        function handleDataMessage(event) {
            const data = event.data;
            if (typeof data === 'string') {
                try {
                    const msg = JSON.parse(data);
                    switch (msg.type) {
                        case 'file_metadata': handleFileMetadata(msg); break;
                        case 'metadata_ack': handleMetadataAck(msg); break;
                        case 'file_end': handleFileEnd(msg); break;
                        case 'retransmit_request': handleRetransmitRequest(msg); break;
                        case 'integrity_verified': handleIntegrityVerified(msg); break;
                        case 'flow_control_ack': handleFlowControlAck(msg); break;
                        case 'cancel_transfer': cancelTransfer(true); break;
                    }
                } catch (e) { dbg.warn('Bad JSON: ' + e.message); }
                return;
            }
            if (data instanceof ArrayBuffer) handleBinaryChunk(data);
        }

        // =====================================================================
        // RECEIVER
        // =====================================================================
        async function handleFileMetadata(data) {
            dbg.info(`[RX] Metadata: ${data.file_name} (${formatFileSize(data.file_size)}) id=${data.file_id}`);

            if (STATE.reception.files.has(data.file_id)) return;

            const store = new StreamingChunkStore(data.file_id, data.total_chunks, data.mime_type || 'application/octet-stream');

            STATE.reception.files.set(data.file_id, {
                metadata: data,
                store: store,
                receivedSize: 0,
                expectedChunks: data.total_chunks,
                finalized: false,
                expectedHash: data.file_hash,
                fileName: data.file_name,
                fileSize: data.file_size,
                lastAckedCount: 0,
                verificationSent: false,
                endReceived: false,
                firstByteTime: null,
                lastByteTime: null
            });

            document.getElementById('transfer-info').style.display = 'block';
            document.getElementById('file-info').innerHTML =
                `<i class="fas fa-download text-primary"></i> Receiving: ${escapeHtml(data.file_name)} (${formatFileSize(data.file_size)})`;

            if (STATE.dataChannel?.readyState === 'open') {
                STATE.dataChannel.send(JSON.stringify({ type: 'metadata_ack', file_id: data.file_id }));
            }
            document.getElementById('received-files-section').style.display = 'block';
        }

        function handleBinaryChunk(buf) {
            if (buf.byteLength < 8) return;
            const view = new DataView(buf);
            const fileId = view.getUint32(0, true);
            const seq = view.getUint32(4, true);
            const chunkLen = buf.byteLength - 8;

            const file = STATE.reception.files.get(fileId);
            if (!file || file.finalized) return;

            const now = Date.now();
            if (!file.firstByteTime) file.firstByteTime = now;
            file.lastByteTime = now;

            // Copy chunk bytes into an independent Uint8Array.
            // This lets the underlying ArrayBuffer (from WebRTC) be GC'd.
            const chunkData = new Uint8Array(chunkLen);
            chunkData.set(new Uint8Array(buf, 8, chunkLen));

            const wasNew = !file.store.has(seq);
            file.store.put(seq, chunkData);

            if (wasNew) file.receivedSize += chunkLen;

            // Send flow-control ACK periodically
            if (file.store.size() - file.lastAckedCount >= CONFIG.flowControlAckEvery ||
                file.store.size() === file.expectedChunks) {
                file.lastAckedCount = file.store.size();
                if (STATE.dataChannel?.readyState === 'open' &&
                    STATE.dataChannel.bufferedAmount < 512 * 1024) {
                    try {
                        STATE.dataChannel.send(JSON.stringify({
                            type: 'flow_control_ack',
                            file_id: fileId,
                            received_chunks: file.store.size()
                        }));
                    } catch (e) { }
                }
            }

            // Progress UI throttled
            if (now - STATE.reception.lastProgressUpdate > CONFIG.progressUpdateInterval) {
                const percent = Math.min(100, (file.receivedSize / file.fileSize) * 100);
                document.getElementById('progress-bar').style.width = `${percent}%`;
                document.getElementById('progress-bar').textContent = `${Math.round(percent)}%`;
                document.getElementById('progress-text').textContent = `${Math.round(percent)}%`;
                if (file.firstByteTime && file.receivedSize > 0) {
                    const elapsed = (now - file.firstByteTime) / 1000;
                    if (elapsed > 0.1) {
                        const speed = file.receivedSize / elapsed;
                        document.getElementById('transfer-speed').innerHTML = formatSpeed(speed);
                        const remaining = (file.fileSize - file.receivedSize) / speed;
                        document.getElementById('time-remaining').innerHTML = `Left: ${formatTime(remaining)}`;
                    }
                }
                STATE.reception.lastProgressUpdate = now;
            }
        }

        async function handleFileEnd(data) {
            const file = STATE.reception.files.get(data.file_id);
            if (!file || file.finalized || file.endReceived) return;
            file.endReceived = true;
            dbg.info(`[RX] End marker for ${file.fileName}, have ${file.store.size()}/${file.expectedChunks}`);

            // Activity-based wait: stay here as long as new chunks keep arriving
            while (file.store.size() < file.expectedChunks) {
                const beforeCount = file.store.size();
                const beforeTime = Date.now();
                let stalled = false;
                // Poll every 200 ms for up to stallDetectMs before considering it stalled
                while (Date.now() - beforeTime < CONFIG.stallDetectMs) {
                    await new Promise(r => setTimeout(r, 200));
                    if (file.store.size() === file.expectedChunks) break;
                    if (file.store.size() > beforeCount) break; // progress made, reset timer
                }
                if (file.store.size() === beforeCount) {
                    stalled = true;
                }
                if (file.store.size() === file.expectedChunks) break;
                if (stalled) break; // drop to retransmit loop
            }

            await finalizeAndVerifyFile(data.file_id);
        }

        async function finalizeAndVerifyFile(fileId) {
            const file = STATE.reception.files.get(fileId);
            if (!file || file.finalized) return;
            file.finalized = true;

            // Retransmit loop — always request the FULL missing set, no 1000-cap
            let missing = file.store.missing();
            let round = 0;
            while (missing.length > 0 && round < CONFIG.maxRetransmitRounds) {
                dbg.warn(`[RX] Round ${round + 1}: requesting ${missing.length} missing chunks for ${file.fileName}`);
                document.getElementById('file-info').innerHTML =
                    `<i class="fas fa-sync fa-spin text-warning"></i> Recovering ${missing.length} chunks: ${escapeHtml(file.fileName)}`;

                if (STATE.dataChannel?.readyState !== 'open') {
                    dbg.err('[RX] Channel closed during recovery');
                    break;
                }

                // Send in batches of 2000 to avoid oversized JSON messages,
                // but request ALL missing chunks (not just 1000).
                const BATCH = 2000;
                for (let i = 0; i < missing.length; i += BATCH) {
                    try {
                        STATE.dataChannel.send(JSON.stringify({
                            type: 'retransmit_request',
                            file_id: fileId,
                            missing_chunks: missing.slice(i, i + BATCH)
                        }));
                    } catch (e) { dbg.err('[RX] Retransmit request: ' + e.message); break; }
                }

                // Wait for sender to replay, with activity-based polling
                const waitStart = Date.now();
                let lastCount = file.store.size();
                while (Date.now() - waitStart < CONFIG.retransmitRoundWait * Math.min(round + 1, 4)) {
                    await new Promise(r => setTimeout(r, 300));
                    if (file.store.size() === file.expectedChunks) break;
                    if (file.store.size() > lastCount) {
                        // progress — keep waiting a bit longer
                        lastCount = file.store.size();
                    }
                }

                missing = file.store.missing();
                round++;
                if (file.store.size() === file.expectedChunks) break;
            }

            if (missing.length > 0) {
                dbg.err(`[RX] ${file.fileName}: ${missing.length} chunks still missing after ${round} rounds`);
                showAlert(`❌ ${file.fileName}: ${missing.length} chunks missing`, 'danger');
                if (!file.verificationSent && STATE.dataChannel?.readyState === 'open') {
                    file.verificationSent = true;
                    STATE.dataChannel.send(JSON.stringify({
                        type: 'integrity_verified',
                        file_id: fileId,
                        success: false,
                        file_name: file.fileName,
                        error: `${missing.length} chunks missing after recovery`
                    }));
                }
                file.store.destroy();
                STATE.reception.files.delete(fileId);
                return;
            }

            // Finalize — near-instant now since hash was streamed during reception
            document.getElementById('file-info').innerHTML =
                `<i class="fas fa-shield-alt text-warning"></i> Verifying: ${escapeHtml(file.fileName)}`;

            let blob, computedHash;
            try {
                const result = file.store.finalize();
                blob = result.blob;
                computedHash = result.hash;
            } catch (e) {
                dbg.err(`[RX] Finalize failed: ${e.message}`);
                if (!file.verificationSent && STATE.dataChannel?.readyState === 'open') {
                    file.verificationSent = true;
                    STATE.dataChannel.send(JSON.stringify({
                        type: 'integrity_verified',
                        file_id: fileId,
                        success: false,
                        file_name: file.fileName,
                        error: 'Finalize: ' + e.message
                    }));
                }
                file.store.destroy();
                STATE.reception.files.delete(fileId);
                return;
            }

            const isValid = (computedHash === file.expectedHash);
            dbg.info(`[RX] ${file.fileName} hash: expected=${file.expectedHash.slice(0, 12)}... got=${computedHash.slice(0, 12)}... match=${isValid}`);

            if (isValid) {
                const url = URL.createObjectURL(blob);
                if (STATE.receivedFiles.length >= 200) {
                    const oldest = STATE.receivedFiles.shift();
                    URL.revokeObjectURL(oldest.url);
                }
                STATE.receivedFiles.push({
                    fileName: file.fileName, blob, url, size: blob.size,
                    hash: file.expectedHash, timestamp: Date.now()
                });

                const card = document.createElement('div');
                card.className = 'file-card success';
                card.innerHTML = `<div class="d-flex justify-content-between align-items-center">
                    <div><strong>${escapeHtml(file.fileName)}</strong>
                    <div class="small text-secondary">${formatFileSize(blob.size)} <i class="fas fa-check-circle text-success ms-1"></i> Verified</div></div>
                    <a href="${url}" download="${escapeHtml(file.fileName)}" class="btn btn-sm btn-outline-primary rounded-pill">
                    <i class="fas fa-save"></i> Save</a></div>`;
                document.getElementById('received-files').appendChild(card);
                document.getElementById('download-all-btn').style.display = 'block';
                document.getElementById('clear-received-btn').style.display = 'inline-block';

                if (!file.verificationSent && STATE.dataChannel?.readyState === 'open') {
                    file.verificationSent = true;
                    try {
                        STATE.dataChannel.send(JSON.stringify({
                            type: 'integrity_verified',
                            file_id: fileId,
                            success: true,
                            file_name: file.fileName
                        }));
                        dbg.info(`[RX] Sent verification SUCCESS for ${file.fileName}`);
                    } catch (e) { dbg.err('[RX] verify send: ' + e.message); }
                }
                showAlert(`✅ Received: ${file.fileName}`, 'success');
            } else {
                dbg.err(`[RX] Hash mismatch on ${file.fileName}`);
                showAlert(`❌ Hash mismatch: ${file.fileName}`, 'danger');
                if (!file.verificationSent && STATE.dataChannel?.readyState === 'open') {
                    file.verificationSent = true;
                    try {
                        STATE.dataChannel.send(JSON.stringify({
                            type: 'integrity_verified',
                            file_id: fileId,
                            success: false,
                            file_name: file.fileName,
                            error: 'Hash mismatch'
                        }));
                    } catch (e) { }
                }
            }

            file.store.destroy();
            STATE.reception.files.delete(fileId);
        }

        // =====================================================================
        // SENDER SIDE MESSAGE HANDLERS
        // =====================================================================
        function handleMetadataAck(msg) {
            if (STATE.transfer.pendingMetadataAck === msg.file_id && STATE.transfer.metadataAckResolver) {
                STATE.transfer.metadataAckResolver();
                STATE.transfer.pendingMetadataAck = null;
                STATE.transfer.metadataAckResolver = null;
            }
        }

        function handleFlowControlAck(msg) {
            const fc = STATE.transfer.flowControl.get(msg.file_id);
            if (fc) {
                fc.ackedChunks = msg.received_chunks;
                if (fc.waiting && fc.resolver) {
                    const r = fc.resolver;
                    fc.resolver = null;
                    fc.waiting = false;
                    r();
                }
            }
        }

        function handleIntegrityVerified(msg) {
            dbg.info(`[TX] Verification for file ${msg.file_id}: success=${msg.success} ${msg.error || ''}`);
            if (STATE.transfer.pendingFileVerify === msg.file_id && STATE.transfer.fileVerifyResolver) {
                STATE.transfer.fileVerifyResolver({ success: msg.success, error: msg.error });
                STATE.transfer.pendingFileVerify = null;
                STATE.transfer.fileVerifyResolver = null;
            }
        }

        async function handleRetransmitRequest(msg) {
            const entry = STATE.transfer.activeFiles.get(msg.file_id);
            if (!entry) { dbg.warn(`[TX] Retransmit for unknown file ${msg.file_id}`); return; }
            const file = entry.file;
            const chunkSize = entry.chunkSize;
            dbg.warn(`[TX] Retransmitting ${msg.missing_chunks.length} chunks for ${file.name}`);
            for (const seq of msg.missing_chunks) {
                if (STATE.isTransferCancelled) break;
                const start = seq * chunkSize;
                const end = Math.min(start + chunkSize, file.size);
                try {
                    const chunkBuf = await file.slice(start, end).arrayBuffer();
                    const out = new ArrayBuffer(8 + chunkBuf.byteLength);
                    const dv = new DataView(out);
                    dv.setUint32(0, msg.file_id, true);
                    dv.setUint32(4, seq, true);
                    new Uint8Array(out, 8, chunkBuf.byteLength).set(new Uint8Array(chunkBuf));
                    if (STATE.dataChannel?.readyState === 'open') {
                        await safeSend(out);
                    }
                } catch (e) { dbg.err(`[TX] Retransmit ${seq}: ${e.message}`); }
            }
        }

        // =====================================================================
        // SENDER MAIN
        // =====================================================================
        async function sendFiles() {
            if (!STATE.transfer.channelReady) { showAlert('Wait for connection', 'warning'); return; }
            if (!STATE.selectedFiles.length) { showAlert('Select files first', 'warning'); return; }

            STATE.transfer.queue = [...STATE.selectedFiles];
            STATE.transfer.totalSize = STATE.transfer.queue.reduce((s, f) => s + f.size, 0);
            STATE.transfer.transferredSize = 0;
            STATE.transfer.completedSize = 0;
            STATE.transfer.startTime = Date.now();
            STATE.transfer.currentFileIdx = 0;
            STATE.transfer.sendingActive = true;
            STATE.isTransferCancelled = false;
            STATE.transfer.fileResults.clear();
            STATE.batchId = Date.now();
            // Reset file-id counter per batch to eliminate reconnect collision risk
            STATE.nextFileId = 1;
            STATE.transfer.networkStartTime = null;
            STATE.transfer.networkBytes = 0;

            document.getElementById('cancel-btn').style.display = 'inline-block';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('transfer-info').style.display = 'block';
            document.getElementById('speed-breakdown').style.display = 'block';
            document.getElementById('batch-report').style.display = 'none';

            dbg.info(`[TX] Batch: ${STATE.transfer.queue.length} files, ${formatFileSize(STATE.transfer.totalSize)}`);
            await processNextFile();
        }

        async function processNextFile() {
            if (STATE.transfer.queue.length === 0 || STATE.isTransferCancelled) {
                if (!STATE.isTransferCancelled && STATE.transfer.currentFileIdx > 0) {
                    const totalTime = (Date.now() - STATE.transfer.startTime) / 1000;
                    const avg = STATE.transfer.totalSize / Math.max(0.001, totalTime);
                    document.getElementById('file-info').innerHTML =
                        `<i class="fas fa-check-circle text-success"></i> Complete! ${STATE.transfer.currentFileIdx} file(s)`;
                    document.getElementById('transfer-speed').innerHTML = `Avg: ${formatSpeed(avg)}`;
                    document.getElementById('time-remaining').innerHTML = `✔️ ${formatTime(totalTime)}`;
                    updateBatchReport();
                    const ok = Array.from(STATE.transfer.fileResults.values()).filter(r => r.success).length;
                    if (ok === STATE.transfer.currentFileIdx) {
                        showAlert(`✅ All ${STATE.transfer.currentFileIdx} files transferred!`, 'success');
                    } else {
                        showAlert(`⚠️ ${ok}/${STATE.transfer.currentFileIdx} succeeded`, 'warning');
                    }
                    STATE.selectedFiles = [];
                    renderSelectedFiles();
                }
                if (STATE.transfer.progressTicker) clearInterval(STATE.transfer.progressTicker);
                document.getElementById('cancel-btn').style.display = 'none';
                document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
                STATE.transfer.sendingActive = false;
                STATE.transfer.activeFiles.clear();
                STATE.transfer.flowControl.clear();
                return;
            }

            STATE.transfer.currentFile = STATE.transfer.queue.shift();
            STATE.transfer.currentFileIdx++;
            STATE.transfer.currentFileSize = STATE.transfer.currentFile.size;
            const totalFiles = STATE.transfer.queue.length + STATE.transfer.currentFileIdx;
            await sendSingleFile(STATE.transfer.currentFile, STATE.transfer.currentFileIdx, totalFiles);

            if (STATE.transfer.queue.length > 0 && !STATE.isTransferCancelled) {
                // Tiny gap to let receiver UI update and drain any residual state
                await new Promise(r => setTimeout(r, 100));
            }
        }

        async function sendSingleFile(file, idx, totalFiles) {
            const fileInfoEl = document.getElementById('file-info');
            fileInfoEl.innerHTML = `<i class="fas fa-upload"></i> Hashing: ${escapeHtml(file.name)} (${formatFileSize(file.size)})`;

            const hashStart = performance.now();
            let fileHash;
            try {
                fileHash = await computeFileHashStreaming(file, (p) => {
                    if (file.size > 50 * 1024 * 1024) {
                        fileInfoEl.innerHTML = `<i class="fas fa-upload"></i> Hashing: ${escapeHtml(file.name)} ${Math.round(p * 100)}%`;
                    }
                });
            } catch (e) {
                dbg.err(`[TX] Hash failed: ${e.message}`);
                STATE.transfer.fileResults.set(file.name, {
                    success: false, size: file.size, reason: `Hash: ${e.message}`
                });
                await processNextFile();
                return;
            }

            const hashMs = performance.now() - hashStart;
            STATE.transfer.lastHashMs = hashMs;
            document.getElementById('hash-time').textContent = `⚡ Hash: ${hashMs.toFixed(0)}ms`;

            fileInfoEl.innerHTML = `<i class="fas fa-upload"></i> Sending: ${escapeHtml(file.name)} (${formatFileSize(file.size)})`;

            const fileId = STATE.nextFileId++;
            // Snapshot the channel-negotiated chunk size for this file.
            // Stays constant for this file so retransmits compute the same offsets.
            const chunkSize = ACTIVE_CHUNK_SIZE;
            const totalChunks = Math.ceil(file.size / chunkSize);

            STATE.transfer.activeFiles.set(fileId, { file, chunkSize });
            STATE.transfer.flowControl.set(fileId, { ackedChunks: 0, waiting: false, resolver: null });

            await waitForChannelOpen();

            const metadata = {
                type: 'file_metadata',
                file_id: fileId,
                file_name: file.name,
                file_size: file.size,
                mime_type: file.type || 'application/octet-stream',
                total_chunks: totalChunks,
                current_index: idx,
                total_files: totalFiles,
                file_hash: fileHash
            };

            STATE.transfer.pendingMetadataAck = fileId;
            const metadataAckPromise = new Promise(resolve => { STATE.transfer.metadataAckResolver = resolve; });
            STATE.dataChannel.send(JSON.stringify(metadata));
            await Promise.race([metadataAckPromise, new Promise(r => setTimeout(r, CONFIG.metadataAckTimeout))]);
            STATE.transfer.pendingMetadataAck = null;
            STATE.transfer.metadataAckResolver = null;

            const netPhaseStart = Date.now();
            if (!STATE.transfer.networkStartTime) STATE.transfer.networkStartTime = netPhaseStart;

            const progressTicker = setInterval(() => {
                if (!STATE.transfer.sendingActive || STATE.isTransferCancelled) return;
                const currentSent = Math.max(0, STATE.transfer.transferredSize - STATE.transfer.completedSize);
                const perFileFrac = Math.min(1, currentSent / Math.max(1, STATE.transfer.currentFileSize));
                const overallFrac = (STATE.transfer.completedSize + currentSent) / Math.max(1, STATE.transfer.totalSize);
                const percent = Math.min(100, Math.round(perFileFrac * 100));
                document.getElementById('progress-bar').style.width = `${percent}%`;
                document.getElementById('progress-bar').textContent = `${percent}%`;
                document.getElementById('progress-text').textContent = `${percent}%`;

                if (totalFiles > 1 && overallFrac >= 0) {
                    document.getElementById('overall-progress-row').style.display = 'block';
                    const overallPercent = Math.min(100, Math.round(overallFrac * 100));
                    document.getElementById('overall-bar').style.width = `${overallPercent}%`;
                    document.getElementById('overall-label').innerHTML = `Overall ${overallPercent}% (${idx}/${totalFiles} files)`;
                }

                const netSec = (Date.now() - STATE.transfer.networkStartTime) / 1000;
                if (netSec > 0.1 && STATE.transfer.networkBytes > 0) {
                    const netSpeed = STATE.transfer.networkBytes / netSec;
                    document.getElementById('transfer-speed').innerHTML = formatSpeed(netSpeed);
                    document.getElementById('net-speed').textContent = `🌐 Network: ${formatSpeed(netSpeed)}`;
                    const remaining = (STATE.transfer.totalSize - STATE.transfer.transferredSize) / Math.max(1, netSpeed);
                    document.getElementById('time-remaining').innerHTML = `⏱️ ${formatTime(remaining)}`;
                }

                const buf = STATE.dataChannel?.bufferedAmount || 0;
                document.getElementById('channel-stats').innerHTML = `📦 Buffer: ${formatFileSize(buf)}`;
            }, CONFIG.progressUpdateInterval);
            STATE.transfer.progressTicker = progressTicker;

            const fc = STATE.transfer.flowControl.get(fileId);
            let chunksSinceYield = 0;
            const YIELD_EVERY = 64;

            // In-flight window in BYTES (not chunks) so it self-adjusts to chunk size.
            // 128 MB mobile / 512 MB desktop — generous but bounded.
            const maxInflightBytes = IS_MOBILE ? 128 * 1024 * 1024 : 512 * 1024 * 1024;
            const maxInflightChunks = Math.max(32, Math.floor(maxInflightBytes / chunkSize));

            try {
                for (let i = 0; i < totalChunks && !STATE.isTransferCancelled; i++) {
                    // Flow control: don't get too far ahead of receiver
                    if (i - fc.ackedChunks >= maxInflightChunks) {
                        await new Promise((resolve) => {
                            fc.waiting = true;
                            fc.resolver = resolve;
                            setTimeout(() => {
                                if (fc.waiting && fc.resolver === resolve) {
                                    fc.resolver = null;
                                    fc.waiting = false;
                                    resolve();
                                }
                            }, 10000);
                        });
                        if (STATE.isTransferCancelled) break;
                    }

                    if (STATE.dataChannel?.readyState !== 'open') {
                        await waitForChannelOpen();
                    }

                    const start = i * chunkSize;
                    const end = Math.min(start + chunkSize, file.size);
                    const chunkBuf = await file.slice(start, end).arrayBuffer();
                    const out = new ArrayBuffer(8 + chunkBuf.byteLength);
                    const dv = new DataView(out);
                    dv.setUint32(0, fileId, true);
                    dv.setUint32(4, i, true);
                    new Uint8Array(out, 8, chunkBuf.byteLength).set(new Uint8Array(chunkBuf));

                    await safeSend(out);

                    STATE.transfer.transferredSize += chunkBuf.byteLength;
                    STATE.transfer.networkBytes += chunkBuf.byteLength;

                    if (++chunksSinceYield >= YIELD_EVERY) {
                        chunksSinceYield = 0;
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
            } catch (e) {
                dbg.err(`[TX] Send failed: ${e.message}`);
                STATE.transfer.fileResults.set(file.name, {
                    success: false, size: file.size, reason: e.message
                });
                if (progressTicker) clearInterval(progressTicker);
                STATE.transfer.activeFiles.delete(fileId);
                STATE.transfer.flowControl.delete(fileId);
                await processNextFile();
                return;
            }

            if (STATE.isTransferCancelled) {
                if (progressTicker) clearInterval(progressTicker);
                STATE.transfer.activeFiles.delete(fileId);
                STATE.transfer.flowControl.delete(fileId);
                return;
            }

            // Drain send buffer before posting file_end
            const drainStart = Date.now();
            while (!STATE.isTransferCancelled && (Date.now() - drainStart) < CONFIG.drainTimeoutMs) {
                const buf = STATE.dataChannel?.bufferedAmount || 0;
                if (buf === 0) break;
                await new Promise(r => setTimeout(r, 100));
            }

            STATE.transfer.completedSize += STATE.transfer.currentFileSize;
            STATE.transfer.transferredSize = STATE.transfer.completedSize;

            if (STATE.dataChannel?.readyState === 'open') {
                try {
                    STATE.dataChannel.send(JSON.stringify({
                        type: 'file_end',
                        file_id: fileId,
                        total_chunks: totalChunks,
                        file_size: file.size
                    }));
                    dbg.info(`[TX] End marker sent for ${file.name}`);
                } catch (e) { dbg.err(`[TX] End marker: ${e.message}`); }
            }

            fileInfoEl.innerHTML = `<i class="fas fa-shield-alt text-info"></i> Awaiting verification: ${escapeHtml(file.name)}`;

            STATE.transfer.pendingFileVerify = fileId;

            let verificationResult;
            try {
                verificationResult = await Promise.race([
                    new Promise(resolve => { STATE.transfer.fileVerifyResolver = resolve; }),
                    new Promise((_, reject) => setTimeout(
                        () => reject(new Error(`Verification timeout after ${CONFIG.completionAckTimeout / 1000}s`)),
                        CONFIG.completionAckTimeout
                    ))
                ]);
            } catch (e) {
                dbg.warn(`[TX] ${file.name}: ${e.message}`);
                verificationResult = { success: false, error: e.message };
            }

            const success = verificationResult && verificationResult.success;
            STATE.transfer.fileResults.set(file.name, {
                success: success,
                size: file.size,
                reason: success ? 'Verified ✓' : (verificationResult?.error || 'Verification failed'),
                hash: fileHash
            });

            STATE.transfer.pendingFileVerify = null;
            STATE.transfer.fileVerifyResolver = null;
            STATE.transfer.activeFiles.delete(fileId);
            STATE.transfer.flowControl.delete(fileId);

            if (progressTicker) clearInterval(progressTicker);
            STATE.transfer.progressTicker = null;

            dbg.info(`[TX] ${file.name}: ${success ? '✓ SUCCESS' : '✗ FAILED'}`);
            await processNextFile();
        }

        function cancelTransfer(fromRemote = false) {
            STATE.isTransferCancelled = true;
            STATE.transfer.sendingActive = false;
            if (STATE.transfer.progressTicker) clearInterval(STATE.transfer.progressTicker);
            for (const [fid, fc] of STATE.transfer.flowControl) {
                if (fc.waiting && fc.resolver) {
                    const r = fc.resolver;
                    fc.resolver = null;
                    fc.waiting = false;
                    r();
                }
            }
            if (STATE.transfer.channelResolver) {
                const r = STATE.transfer.channelResolver;
                STATE.transfer.channelResolver = null;
                STATE.transfer.channelPaused = false;
                r();
            }
            if (!fromRemote && STATE.dataChannel?.readyState === 'open') {
                try { STATE.dataChannel.send(JSON.stringify({ type: 'cancel_transfer' })); } catch (e) { }
            }
            showAlert('Transfer cancelled', 'warning');
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
        }

        // =====================================================================
        // UI
        // =====================================================================
        function setupDropZone() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => { addFiles(e.target.files); fileInput.value = ''; });
            ['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }));
            ['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }));
            dropZone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
        }

        function addFiles(list) {
            for (let f of Array.from(list)) {
                if (f.size > CONFIG.MAX_FILE_SIZE) {
                    showAlert(`${f.name} is ${formatFileSize(f.size)} — max 5 GB`, 'danger');
                    continue;
                }
                if (!STATE.selectedFiles.some(ex => ex.name === f.name && ex.size === f.size))
                    STATE.selectedFiles.push(f);
            }
            renderSelectedFiles();
            if (STATE.transfer.channelReady)
                document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
        }

        function renderSelectedFiles() {
            const container = document.getElementById('selected-files');
            if (!STATE.selectedFiles.length) { container.innerHTML = ''; return; }
            const total = STATE.selectedFiles.reduce((s, f) => s + f.size, 0);
            let html = `<div class="fw-semibold small">📁 ${STATE.selectedFiles.length} files · ${formatFileSize(total)}</div><div class="mt-1">`;
            STATE.selectedFiles.forEach((f, i) => {
                html += `<div class="d-flex justify-content-between align-items-center border-bottom py-1">
                    <span class="text-truncate" style="max-width: 70%;">📄 ${escapeHtml(f.name)} (${formatFileSize(f.size)})</span>
                    <button class="btn btn-sm btn-link text-danger p-0" data-idx="${i}"><i class="fas fa-times-circle"></i></button>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
            container.querySelectorAll('button[data-idx]').forEach(btn =>
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    STATE.selectedFiles.splice(parseInt(btn.dataset.idx), 1);
                    renderSelectedFiles();
                    if (STATE.transfer.channelReady)
                        document.getElementById('send-btn').disabled = (STATE.selectedFiles.length === 0);
                })
            );
        }

        function clearReceivedFiles() {
            if (!confirm(`Clear ${STATE.receivedFiles.length} received files?`)) return;
            STATE.receivedFiles.forEach(f => URL.revokeObjectURL(f.url));
            STATE.receivedFiles = [];
