<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Payment - Fast Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .payment-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 32px 24px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .amount-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            color: white;
        }

        .amount-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .amount-value {
            font-size: 48px;
            font-weight: bold;
        }

        .amount-input-group {
            margin-bottom: 24px;
        }

        .amount-input-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .amount-input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            transition: all 0.3s;
        }

        .amount-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .pay-button {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .pay-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.3);
        }

        .pay-button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .info-note {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        @media (max-width: 480px) {
            .payment-container {
                padding: 24px 20px;
            }

            .amount-value {
                font-size: 36px;
            }
        }

        /* crypto */
        /* crypto modal - improved visibility */
        .crypto-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .crypto-modal-content {
            background: white;
            margin: 10% auto;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .crypto-close {
            position: absolute;
            right: 16px;
            top: 12px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .crypto-close:hover {
            color: #333;
        }

        .crypto-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .crypto-option {
            padding: 14px;
            margin: 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .crypto-option:hover {
            border-color: #f7931a;
            background: #fff8f0;
        }

        #btcOption i {
            color: #f7931a;
            font-size: 20px;
            margin-right: 10px;
        }

        #usdtOption i {
            color: #26a17b;
            font-size: 18px;
            margin-right: 10px;
        }

        #cryptoDetails {
            margin-top: 20px;
        }

        #qrCode {
            width: 180px;
            height: 180px;
            margin: 15px auto;
            display: block;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            background: white;
        }

        #walletAddress {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
        }

        #copyAddressBtn {
            background: #f7931a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #copyAddressBtn:hover {
            background: #e6860e;
        }

        .crypto-modal-content h2 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        .crypto-donate-btn {
            background: linear-gradient(135deg, #f7931a 0%, #ffd700 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .crypto-donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(247, 147, 26, 0.4);
        }

        .crypto-donate-btn:active {
            transform: translateY(0);
        }

        .crypto-donate-btn i {
            font-size: 20px;
        }
    </style>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
    <div class="payment-container">
        <h1>💳 Quick Payment</h1>
        <div class="subtitle">Secure & Instant</div>

        <div id="errorMessage" class="error-message"></div>

        <div class="amount-card">
            <div class="amount-label">Total Amount</div>
            <div class="amount-value">₹<span id="displayAmount">100</span></div>
        </div>

        <div class="amount-input-group">
            <label>Enter Amount (₹)</label>
            <input type="number" id="amount" placeholder="Enter amount" min="1" step="1" value="100">
        </div>

        <button class="pay-button" id="payButton" onclick="processPayment()">
            Pay Now →
        </button>
        <div style="text-align: center; margin: 15px 0; position: relative;">
    <div style="border-top: 1px solid #e0e0e0; position: absolute; top: 50%; width: 100%;"></div>
    <span style="background: white; padding: 0 15px; position: relative; font-size: 14px; color: #999;">OR</span>
</div>
        <button id="cryptoBtn" class="crypto-donate-btn" style="margin-top: 25px;"
            onclick="document.getElementById('cryptoModal').style.display='block'">
            <i class="fab fa-bitcoin"></i> <i class="fab fa-ethereum"></i> Donate with Crypto
        </button>

        <div class="info-note">
            🔒 100% Secure Payment • Instant Confirmation
        </div>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <!-- crypto payment -->

    <div id="cryptoModal" class="crypto-modal">
        <div class="crypto-modal-content">
            <span class="crypto-close">&times;</span>
            <h2>Send Crypto Donation</h2>
            <div class="crypto-options" id="cryptoOptions">
                <div class="crypto-option" id="btcOption">
                    <i class="fab fa-bitcoin"></i> Bitcoin (BTC-BEP20)
                </div>
                <div class="crypto-option" id="usdtOption">
                    <i class="fas fa-dollar-sign"></i> USDT (BEP20)
                </div>
            </div>
            <div id="cryptoDetails" style="display:none;">
                <img id="qrCode" src="" alt="QR Code" style="width: 200px; margin: 15px auto; display: block;">
                <p style="font-weight: bold; margin: 10px 0 5px;">Wallet Address:</p>
                <p id="walletAddress"
                    style="background: #f5f5f5; padding: 10px; border-radius: 8px; font-size: 12px; word-break: break-all;">
                </p>
                <button id="copyAddressBtn"
                    style="background: #f7931a; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer;">Copy
                    Address</button>
                <p style="font-size: 12px; color: #666; margin-top: 15px;">
                    <i class="fas fa-info-circle"></i> Send only BTC to Bitcoin(BEP20) address, USDT (BEP20) to USDT
                    address
                </p>
            </div>
        </div>
    </div>

    <script>
        // Update display amount
        const amountInput = document.getElementById('amount');
        const displayAmount = document.getElementById('displayAmount');
        const errorDiv = document.getElementById('errorMessage');

        amountInput.addEventListener('input', function () {
            displayAmount.textContent = this.value || 0;
            // Hide error when user changes amount
            errorDiv.style.display = 'none';
        });

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function processPayment() {
            const amount = amountInput.value;

            if (!amount || amount <= 0) {
                showError('Please enter a valid amount');
                return;
            }

            if (amount < 10) {
                showError('Minimum payment amount is ₹10');
                return;
            }

            const button = document.getElementById('payButton');
            const originalText = button.textContent;
            button.textContent = '⏳ Creating order...';
            button.disabled = true;

            try {
                // Create Razorpay order
                const response = await fetch('/create-razorpay-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });

                const orderData = await response.json();

                if (!orderData.success) {
                    throw new Error(orderData.error || 'Failed to create order');
                }

                // Razorpay options
                const options = {
                    "key": orderData.key,
                    "amount": orderData.amount,
                    "currency": orderData.currency,
                    "name": "Vishnu Kumar",
                    "description": `Payment of ₹${amount}`,
                    "order_id": orderData.order_id,
                    "image": "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",

                    // Prefill user details (user can edit)
                    "prefill": {
                        "name": "",
                        "email": "",
                        "contact": ""
                    },

                    "notes": {
                        "address": "Online Payment"
                    },

                    "theme": {
                        "color": "#667eea",
                        "hide_topbar": false
                    },

                    "modal": {
                        "ondismiss": function () {
                            button.textContent = originalText;
                            button.disabled = false;
                        }
                    },

                    "handler": function (response) {
                        const params = new URLSearchParams({
                            method: 'razorpay',
                            amount: amount,
                            payment_id: response.razorpay_payment_id,  // ✅ This is critical
                            order_id: response.razorpay_order_id
                        });
                        window.location.href = `/payment-success?${params.toString()}`;
                    }
                };

                const rzp = new Razorpay(options);

                // Handle payment failure
                rzp.on('payment.failed', function (response) {
                    console.error('Payment failed:', response.error);
                    showError('Payment failed: ' + (response.error.description || 'Please try again'));
                    button.textContent = originalText;
                    button.disabled = false;
                });

                // Open payment modal
                rzp.open();

            } catch (error) {
                console.error('Payment error:', error);
                showError('Payment failed: ' + error.message);
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        //  ############### crypto pay,emt
        // ############### crypto payment ###############
        const WALLETS = {
            btc: "0xb1301092f1f405469AB4b9F0853880C4B620B3dD",
            usdt: "0xb1301092f1f405469AB4b9F0853880C4B620B3dD"
        };

        // Open modal
        document.getElementById('cryptoBtn').onclick = function () {
            document.getElementById('cryptoModal').style.display = 'block';
        };

        // Close modal on X click
        document.querySelector('.crypto-close').onclick = function () {
            document.getElementById('cryptoModal').style.display = 'none';
            document.getElementById('cryptoOptions').style.display = 'block';
            document.getElementById('cryptoDetails').style.display = 'none';
        };

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('cryptoModal');
            if (event.target === modal) {
                modal.style.display = 'none';
                document.getElementById('cryptoOptions').style.display = 'block';
                document.getElementById('cryptoDetails').style.display = 'none';
            }
        };

        // BTC option
        document.getElementById('btcOption').onclick = function () {
            showCryptoDetails(WALLETS.btc, 'Bitcoin');
        };

        // USDT option
        document.getElementById('usdtOption').onclick = function () {
            showCryptoDetails(WALLETS.usdt, 'USDT (TRC20)');
        };

        function showCryptoDetails(address, currency) {
            document.getElementById('cryptoOptions').style.display = 'none';
            document.getElementById('cryptoDetails').style.display = 'block';

            // Use MANUAL QR images from your server
            if (currency === 'Bitcoin') {
                document.getElementById('qrCode').src = '/static/images/bitcoin.jpeg';
            } else {
                document.getElementById('qrCode').src = '/static/images/usdt.jpeg';
            }

            document.getElementById('walletAddress').innerText = address;
        }

        // Copy address
        document.getElementById('copyAddressBtn').onclick = function () {
            const address = document.getElementById('walletAddress').innerText;
            navigator.clipboard.writeText(address);
            alert('Address copied to clipboard!');
        };
    </script>
</body>

</html>
